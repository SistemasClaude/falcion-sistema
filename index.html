<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FalciON — Sistema de Projetos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet'/>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/pt-br.global.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F5;--white:#FFFFFF;--border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-light:#DBEAFE;
  --green:#16A34A;--red:#DC2626;--orange:#F59E0B;
  --sidebar:#FFFFFF;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── LOGIN ── */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%;background:linear-gradient(160deg,#1A2F4A 0%,#0d1e30 60%,#162539 100%);padding:32px 16px}
.login-header{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
.login-logo{font-size:1.9rem;font-weight:800;color:#FFFFFF;letter-spacing:1px}
.login-logo span{color:#C9A84C;font-weight:300}
.login-tagline{font-size:.75rem;color:rgba(201,168,76,.7);text-transform:uppercase;letter-spacing:2.5px;font-weight:500}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:28px 24px;width:100%;max-width:520px;box-shadow:0 16px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.login-box-title{font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:20px;font-weight:500;text-transform:uppercase;letter-spacing:1.8px;text-align:center;padding-bottom:16px;border-bottom:1px solid rgba(201,168,76,.15)}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;align-items:center;gap:9px;width:100%;text-align:center}
.profile-btn:hover{border-color:#C9A84C;background:rgba(201,168,76,.1);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.3),0 0 0 1px rgba(201,168,76,.3)}
.profile-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#C9A84C 0%,#9e7e30 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;box-shadow:0 3px 10px rgba(201,168,76,.35),0 0 0 3px rgba(201,168,76,.15)}
.profile-name{font-size:.87rem;color:#FFFFFF;font-weight:700;line-height:1.2}
.profile-email{font-size:.66rem;color:rgba(255,255,255,.38);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px;width:100%}
.login-footer{margin-top:20px;text-align:center;font-size:.68rem;color:rgba(255,255,255,.2);letter-spacing:.5px}

/* ── LAYOUT ── */
#app{display:flex;width:100%;min-height:100vh;display:none}

/* ── SIDEBAR ── */
#sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-text{font-size:1.1rem;font-weight:800;color:var(--text);letter-spacing:.5px}
.logo-sub{font-size:.6rem;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase}
.sidebar-menu{padding:8px 0}
.menu-label{font-size:.62rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:10px 16px 4px;font-weight:600}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:.875rem;color:var(--text2);transition:all .15s;border-left:3px solid transparent;margin:1px 0}
.menu-item:hover{background:var(--bg);color:var(--text)}
.menu-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.menu-icon{font-size:.95rem;width:18px;text-align:center;opacity:.8}
.sidebar-clients{flex:1;overflow-y:auto;padding:0 0 8px}
.client-menu-item{padding:6px 16px 6px 28px;font-size:.78rem;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-menu-item::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.client-menu-item:hover{color:var(--text2)}
.sidebar-user{border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:.8rem;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:4px;border-radius:6px;transition:color .2s;display:flex;align-items:center}
.logout-btn:hover{color:var(--red)}
.settings-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:4px;border-radius:6px;display:flex;align-items:center}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.page-title{font-size:1rem;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.date-badge{font-size:.78rem;color:var(--text2);background:var(--bg);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.notif-btn{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;font-size:.9rem}
.notif-btn:hover{border-color:var(--blue);color:var(--blue)}
.notif-count{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:.6rem;font-weight:700;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.page-content{padding:24px;flex:1}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-icon{font-size:1.4rem;margin-bottom:4px}
.stat-label{font-size:.7rem;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.stat-value{font-size:2rem;font-weight:800;color:var(--text);line-height:1.1}
.stat-sub{font-size:.73rem;color:var(--text3)}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:1rem;font-weight:700;color:var(--text)}
.status-filter-btn{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.82rem;color:var(--text2);cursor:pointer;font-weight:500}
.status-filter-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── CLIENT CARDS (dashboard) ── */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.client-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.client-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
.client-card-banner{width:100%;height:140px;background:#f3f4f6;overflow:hidden;position:relative}
.client-card-banner img{width:100%;height:100%;object-fit:cover}
.client-card-banner-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text3);background:linear-gradient(135deg,#f3f4f6,#e5e7eb)}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.card-action-btn{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;opacity:0;transition:opacity .2s}
.client-card:hover .card-action-btn{opacity:1}
.card-action-edit{background:rgba(255,255,255,.9);color:var(--blue)}
.card-action-del{background:rgba(255,255,255,.9);color:var(--red)}
.client-card-body{padding:14px 16px}
.client-card-name{font-size:.95rem;font-weight:700;color:var(--blue);margin-bottom:12px;cursor:pointer}
.client-card-name:hover{text-decoration:underline}
.client-card-row{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;padding:5px 0;border-bottom:1px solid var(--border)}
.client-card-row:last-child{border-bottom:none}
.client-card-label{color:var(--text2);text-transform:uppercase;font-size:.68rem;letter-spacing:.5px;font-weight:600}
.client-card-val{color:var(--text);font-weight:700;font-size:.82rem}
.saldo-neg{color:var(--red)!important}
.status-ativo{color:var(--green);font-weight:700;font-size:.78rem;text-transform:uppercase}
.status-inativo{color:var(--red);font-weight:700;font-size:.78rem;text-transform:uppercase}
.status-pausado{color:var(--orange);font-weight:700;font-size:.78rem;text-transform:uppercase}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:6px}
.badge-green{background:#DCFCE7;color:#16A34A}
.badge-red{background:#FEE2E2;color:#DC2626}
.badge-orange{background:#FEF3C7;color:#D97706}
.badge-blue{background:#DBEAFE;color:#2563EB}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.85rem;color:var(--text);outline:none;min-width:200px}
.filter-input:focus{border-color:var(--blue)}
.filter-select{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.82rem;color:var(--text);outline:none;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1D4ED8}
.btn-ghost{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:#FEE2E2;color:var(--red);border:1px solid #FECACA}
.btn-danger:hover{background:#FECACA}
.btn-sm{padding:5px 10px;font-size:.78rem}

/* ── TABLE ── */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse}
th{background:#F9FAFB;padding:11px 16px;text-align:left;font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);font-weight:600}
td{padding:12px 16px;font-size:.855rem;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.action-cell{display:flex;gap:6px}

/* ── DETAIL PAGE ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:.85rem;cursor:pointer;margin-bottom:18px;padding:6px 0;transition:color .2s}
.back-btn:hover{color:var(--blue)}
.detail-header{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.detail-name{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:14px}
.detail-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.meta-val{font-size:1rem;font-weight:700;color:var(--text)}

/* ── DETAIL HEADER ── */
.detail-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:9}
.detail-topbar-left{display:flex;align-items:center;gap:12px}
.detail-back{background:none;border:none;cursor:pointer;color:var(--text2);font-size:1.1rem;display:flex;align-items:center;padding:4px;border-radius:6px;transition:color .2s}
.detail-back:hover{color:var(--blue)}
.detail-client-name{font-size:1.4rem;font-weight:800;color:var(--blue)}
.detail-status-badge{background:#DCFCE7;color:#16A34A;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase}
.detail-topbar-right{text-align:right}
.detail-credit-label{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.detail-credit-value{font-size:1.3rem;font-weight:800;color:var(--text)}

/* ── TABS ── */
.tabs{display:flex;gap:0;background:var(--white);border-bottom:1px solid var(--border);margin-bottom:0;flex-wrap:wrap}
.tab{padding:14px 20px;font-size:.88rem;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tab:hover:not(.active){color:var(--text)}

/* ── TAB CONTENT ── */
.tab-content-wrap{padding:24px}
.filter-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filter-card-label{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group-label{font-size:.68rem;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.clear-btn{margin-left:auto;font-size:.78rem;color:var(--text2);background:none;border:none;cursor:pointer;font-weight:600}
.clear-btn:hover{color:var(--red)}

/* ── TASK TABLE ── */
.list-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.list-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.list-card-title{font-size:.72rem;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.list-card-actions{display:flex;align-items:center;gap:12px}
.list-action-link{font-size:.78rem;color:var(--blue);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none}
.list-action-link:hover{text-decoration:underline}
.list-action-add{font-size:.78rem;color:var(--blue);font-weight:700;cursor:pointer;background:none;border:none}
.task-table{width:100%;border-collapse:collapse}
.task-table th{padding:10px 16px;text-align:left;font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);font-weight:600;background:#FAFAFA}
.task-table td{padding:14px 16px;font-size:.82rem;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:#FAFAFA}
.task-check{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.task-name{font-weight:600;font-size:.82rem;text-transform:uppercase;color:var(--text)}
.consultant-avatar{width:30px;height:30px;border-radius:50%;background:#E5E7EB;color:var(--text);display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;text-transform:uppercase}
.badge-pendente{background:#FEF3C7;color:#D97706;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.badge-concluida{background:#DCFCE7;color:#16A34A;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.badge-atrasada{background:#FEE2E2;color:#DC2626;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;font-size:.85rem;color:var(--text2);transition:color .15s}
.icon-btn:hover{color:var(--blue)}
.icon-btn.del:hover{color:var(--red)}

/* ── VISIT TIMELINE ── */
.visit-item{display:grid;grid-template-columns:20px 1fr auto;gap:12px;align-items:start;padding:14px 0;border-bottom:1px solid var(--border)}
.visit-item:last-child{border-bottom:none}
.visit-dot{width:12px;height:12px;border-radius:50%;background:var(--blue);margin-top:4px;flex-shrink:0}
.visit-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.visit-date{font-size:.82rem;font-weight:600;color:var(--text)}
.visit-consultant{font-size:.75rem;font-weight:700;color:var(--blue);text-transform:uppercase}
.visit-desc{font-size:.82rem;color:var(--text2);line-height:1.5;margin-top:4px}
.visit-duration{font-size:.95rem;font-weight:700;color:var(--blue);white-space:nowrap}
.visit-right{display:flex;align-items:center;gap:6px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;display:none}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:.78rem;color:var(--text2);font-weight:600}
.form-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.88rem;color:var(--text);outline:none;width:100%;transition:border-color .2s}
.form-input:focus{border-color:var(--blue);background:var(--white)}
.form-input[type=number]{-moz-appearance:textfield}
textarea.form-input{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-text{font-size:.88rem}

/* ── AGENDA ── */
.agenda-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toggle-btn{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);transition:all .2s}
.toggle-btn.on{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
#calendar .fc-toolbar-title{color:var(--text);font-size:1rem}
#calendar .fc-button{background:var(--white);border:1px solid var(--border);color:var(--text2);font-size:.8rem;padding:4px 10px}
#calendar .fc-button:hover{background:var(--bg);color:var(--text)}
#calendar .fc-button-active{background:var(--blue)!important;color:#fff!important;border-color:var(--blue)!important}
#calendar .fc-col-header-cell{background:#F9FAFB;color:var(--text2);font-size:.78rem}
#calendar .fc-daygrid-day{background:var(--white)}
#calendar .fc-day-today{background:var(--blue-bg)!important}
#calendar .fc-event{font-size:.75rem;cursor:pointer;border-radius:4px!important}

/* ── GCAL ── */
.gcal-section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.gcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gcal-title{font-size:.85rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.gcal-event{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.gcal-event:last-child{border-bottom:none}
.gcal-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.gcal-evname{font-size:.85rem;color:var(--text);font-weight:500}
.gcal-evtime{font-size:.74rem;color:var(--text2)}
.gcal-connect-btn{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-size:.82rem;cursor:pointer;transition:all .2s}
.gcal-connect-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── INFO BOX ── */
.info-box{background:var(--blue-bg);border:1px solid var(--blue-light);border-radius:10px;padding:10px 16px;font-size:.8rem;color:var(--blue);margin-bottom:18px}

@media(max-width:900px){#sidebar{display:none}.stat-grid{grid-template-columns:1fr 1fr}.detail-meta{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>

function fmt(n) {
  const h = Math.floor(Math.abs(n));
  const m = Math.round((Math.abs(n) - h) * 60);
  const s = (n < 0 ? '-' : '') + h.toString() + ':' + m.toString().padStart(2, '0');
  return s;
}

function parseDuration(str) {
  if (!str) return 0;
  const [h, m] = str.split(':').map(Number);
  return h + (m || 0) / 60;
}

function calcSaldo(project) {
  if (!project) return 0;
  const now = new Date();
  const created = new Date(project.createdAt);
  const createdYear = created.getUTCFullYear();
  const createdMonth = created.getUTCMonth();
  const nowYear = now.getFullYear();
  const nowMonth = now.getMonth();
  const monthsElapsed = Math.max(0, (nowYear - createdYear) * 12 + (nowMonth - createdMonth)) + 1;
  const total = project.initialHours + monthsElapsed * project.monthlyQuotaHours;
  const used = state.visits
    .filter(v => v.projectId === project.id)
    .reduce((acc, v) => acc + parseDuration(v.duration), 0);
  return total - used;
}

function calcSaldoMensal(project, year, month) {
  // Saldo no início do mês = horas acumuladas até o mês anterior - visitas antes do mês
  const created = new Date(project.createdAt);
  const createdYear = created.getUTCFullYear();
  const createdMonth = created.getUTCMonth();

  // Meses até o início do mês (exclusive)
  const monthsBefore = Math.max(0, (year - createdYear) * 12 + (month - createdMonth));
  const totalBefore = project.initialHours + monthsBefore * project.monthlyQuotaHours;

  const firstOfMonth = `${year}-${String(month + 1).padStart(2,'0')}-01`;
  const visitasAntes = state.visits
    .filter(v => v.projectId === project.id && v.date < firstOfMonth)
    .reduce((acc, v) => acc + parseDuration(v.duration), 0);

  const saldoInicial = totalBefore - visitasAntes;

  // Visitas do mês
  const mesStr = `${year}-${String(month + 1).padStart(2,'0')}`;
  const visitasMes = state.visits
    .filter(v => v.projectId === project.id && v.date && v.date.startsWith(mesStr))
    .sort((a, b) => a.date.localeCompare(b.date));

  const horasGastas = visitasMes.reduce((acc, v) => acc + parseDuration(v.duration), 0);
  const saldoFinal = saldoInicial - horasGastas;

  return { saldoInicial, visitasMes, horasGastas, saldoFinal };
}

function mapProject(r) {

    id: r.id,
    name: r.name,
    imageUrl: r.image_url || null,
    monthlyQuotaHours: Number(r.monthly_quota_hours) || 0,
    initialHours: Number(r.initial_hours) || 0,
    currentBalanceHours: Number(r.current_balance_hours) || 0,
    lastQuotaResetDate: r.last_quota_reset_date || null,
    firstPaymentDate: r.first_payment_date || null,
    lastPaymentDate: r.last_payment_date || null,
    status: r.status || 'ATIVO',
    createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()
  };
}

function mapTask(r) {
  return {
    id: r.id,
    projectId: r.project_id,
    title: r.title,
    description: r.description || '',
    assignedTo: r.assigned_to || '',
    deadline: r.deadline || '',

    status: r.status || 'pending',
    createdAt: r.created_at
  };

    taskId: r.task_id || null,

}

function mapOccurrence(r) {

async function initApp() {
  try {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('userAvatar').textContent = avatar(state.currentUser?.name || '');

      document.getElementById('loadingOverlay').style.display = 'none';

      alert('Erro ao carregar dados. Faça login novamente.');

    await loadAll();

    navigate('dashboard');

  else if (page === 'clientes') renderClientes();
  else if (page === 'tarefas') renderTarefas();
  else if (page === 'agenda') renderAgenda();
  else if (page === 'detail') renderDetail(projectId);
}

function openProject(id) {
  selectedProjectId = id;
  navigate('detail', id);
}

}

// ── DETAIL ──
let detailTab = 'tarefas';

function initials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function renderDetail(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) { navigate('clientes'); return; }
  const saldo = calcSaldo(p);

  document.getElementById('pageTitle').textContent = p.name;
  // Inject detail topbar + tabs into pageContent
  document.getElementById('pageContent').style.padding = '0';
  document.getElementById('pageContent').innerHTML = `
    <div class="detail-topbar">
      <div class="detail-topbar-left">
        <button class="detail-back" onclick="navigate('clientes')">←</button>
        <div class="detail-client-name">${p.name}</div>
        <span class="detail-status-badge">${p.status}</span>
      </div>
      <div class="detail-topbar-right" style="display:flex;align-items:center;gap:16px">
        <button onclick="gerarRelatorioMensal('${id}')" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">📄 Relatório do Mês</button>
        <div>
          <div class="detail-credit-label">Crédito Total &nbsp;&nbsp;&nbsp; Total</div>
          <div class="detail-credit-value ${saldo<0?'saldo-neg':''}">${fmt(saldo)} h</div>
        </div>
      </div>
    </div>
    <div class="tabs" id="detailTabs">
      <button class="tab ${detailTab==='tarefas'?'active':''}" onclick="switchTab('tarefas','${id}')">Tarefas</button>
      <button class="tab ${detailTab==='visitas'?'active':''}" onclick="switchTab('visitas','${id}')">Registro de Visitas</button>
      <button class="tab ${detailTab==='notas'?'active':''}" onclick="switchTab('notas','${id}')">Notas</button>
      <button class="tab ${detailTab==='contatos'?'active':''}" onclick="switchTab('contatos','${id}')">Contatos</button>
      <button class="tab ${detailTab==='ocorrencias'?'active':''}" onclick="switchTab('ocorrencias','${id}')">Ocorrências</button>
    </div>
    <div id="tabContent" class="tab-content-wrap"></div>
  `;
  renderTab(id);
}

function switchTab(tab, id) {
  detailTab = tab;
  document.querySelectorAll('#detailTabs .tab').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderTab(id);
}

function renderTab(id) {
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (detailTab === 'tarefas') el.innerHTML = renderTabTarefas(id);
  else if (detailTab === 'visitas') el.innerHTML = renderTabVisitas(id);
  else if (detailTab === 'notas') el.innerHTML = renderTabNotas(id);
  else if (detailTab === 'contatos') el.innerHTML = renderTabContatos(id);
  else if (detailTab === 'ocorrencias') el.innerHTML = renderTabOcorrencias(id);
}

function taskBadge(t) {
  if (t.status === 'completed') return '<span class="badge-concluida">Concluída</span>';
  if (t.deadline && t.deadline < new Date().toISOString().split('T')[0]) return '<span class="badge-atrasada">Atrasada</span>';
  return '<span class="badge-pendente">Pendente</span>';
}

// ── TAREFAS PAGE ──
let tarefaSearch = '';
let tarefaStatus = 'all';
let tarefaProject = 'all';

function renderTarefas() {
  let tasks = state.tasks;
  if (tarefaSearch) tasks = tasks.filter(t => t.title.toLowerCase().includes(tarefaSearch.toLowerCase()));
  if (tarefaStatus !== 'all') tasks = tasks.filter(t => t.status === tarefaStatus);
  if (tarefaProject !== 'all') tasks = tasks.filter(t => t.projectId === tarefaProject);
  const today = new Date().toISOString().split('T')[0];
  const projName = id => (state.projects.find(p => p.id === id) || {}).name || '—';

  document.getElementById('pageContent').innerHTML = `
    <div class="filter-bar" style="margin-bottom:16px">
      <input class="filter-input" placeholder="🔍 Buscar tarefa..." value="${tarefaSearch}" oninput="tarefaSearch=this.value;renderTarefas()">
      <select class="filter-select" onchange="tarefaStatus=this.value;renderTarefas()">
        <option value="all">Todos os status</option>
        <option value="pending" ${tarefaStatus==='pending'?'selected':''}>Pendentes</option>
        <option value="completed" ${tarefaStatus==='completed'?'selected':''}>Concluídas</option>
      </select>
      <select class="filter-select" onchange="tarefaProject=this.value;renderTarefas()">
        <option value="all">Todos os clientes</option>
        ${state.projects.map(p => `<option value="${p.id}" ${tarefaProject===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="openModalNewTask(null)">+ Nova Tarefa</button>
    </div>
    <div class="list-card">
      <div class="list-card-header">
        <span class="list-card-title">Lista de Tarefas (${tasks.length})</span>
      </div>
      <table class="task-table">
        <thead><tr>
          <th style="width:32px"></th>
          <th>Tarefa</th><th>Cliente</th><th>Consultor(a)</th><th>Prazo</th><th>Status</th><th>Ações</th>
        </tr></thead>
        <tbody>
          ${tasks.length ? tasks.map(t => {
            const overdue = t.status !== 'completed' && t.deadline && t.deadline < today;
            return `<tr>
              <td><input type="checkbox" class="task-check" ${t.status==='completed'?'checked':''} onchange="completeTask('${t.id}',null)"></td>
              <td>
                <div class="task-name">${t.title}</div>
                ${t.description?`<div style="font-size:.75rem;color:var(--text2);font-weight:400;text-transform:none;margin-top:2px">${t.description}</div>`:''}
              </td>
              <td><span style="cursor:pointer;color:var(--blue);font-size:.82rem;font-weight:500" onclick="openProject('${t.projectId}')">${projName(t.projectId)}</span></td>
              <td><div class="consultant-avatar" title="${t.assignedTo||''}">${initials(t.assignedTo)}</div></td>

    });

function getCalendarEvents() {
  const events = [];
  const filterProject = p => agendaProjectFilter === 'all' || p === agendaProjectFilter;

  if (calFilters.tasks) {
    state.tasks.filter(t => t.deadline && filterProject(t.projectId)).forEach(t => {
      const proj = state.projects.find(p => p.id === t.projectId);
      events.push({ id: 'task-' + t.id, title: '✅ ' + t.title, start: t.deadline, backgroundColor: '#16a34a', borderColor: '#16a34a', extendedProps: { type: 'task', data: t, projName: proj?.name || '' } });
    });
  }
  if (calFilters.visits) {
    state.visits.filter(v => v.date && filterProject(v.projectId)).forEach(v => {
      const proj = state.projects.find(p => p.id === v.projectId);
      events.push({ id: 'visit-' + v.id, title: '🕐 ' + (proj?.name || 'Visita'), start: v.date, backgroundColor: '#f59e0b', borderColor: '#f59e0b', extendedProps: { type: 'visit', data: v, projName: proj?.name || '' } });
    });
  }
  if (calFilters.occurrences) {
    state.occurrences.filter(o => o.date && filterProject(o.projectId)).forEach(o => {
      const proj = state.projects.find(p => p.id === o.projectId);
      events.push({ id: 'occ-' + o.id, title: '⚠️ ' + (o.title || o.description || 'Ocorrência'), start: o.date, backgroundColor: '#dc2626', borderColor: '#dc2626', extendedProps: { type: 'occurrence', data: o, projName: proj?.name || '' } });
    });
  }
  if (calFilters.custom) {
    state.customEvents.filter(e => filterProject(e.projectId)).forEach(e => {
      events.push({ id: 'custom-' + e.id, title: '📅 ' + e.title, start: e.start, end: e.end, backgroundColor: '#3b82f6', borderColor: '#3b82f6', extendedProps: { type: 'custom', data: e } });
    });
  }
  return events;
}

function toggleFilter(key) {
  calFilters[key] = !calFilters[key];
  renderAgenda();
}

function refreshCalendar() {
  if (!calendarInstance) return;
  calendarInstance.removeAllEvents();
  calendarInstance.addEventSource(getCalendarEvents());
}

function handleEventClick(info) {
  const { type, data, projName } = info.event.extendedProps;
  let html = '';
  if (type === 'task') html = `<b>${data.title}</b><br>Cliente: ${projName}<br>Prazo: ${fmtDate(data.deadline)}<br>Status: ${data.status}`;
  else if (type === 'visit') html = `<b>Visita — ${projName}</b><br>Data: ${fmtDate(data.date)}<br>Duração: ${data.duration}<br>${data.description||''}`;
  else if (type === 'occurrence') html = `<b>${data.title||'Ocorrência'}</b><br>Cliente: ${projName}<br>Data: ${fmtDate(data.date)}<br>${data.description||''}`;
  else if (type === 'custom') html = `<b>${data.title}</b><br>Início: ${data.start}<br>Fim: ${data.end||''}`;
  openModal(`<div class="modal-title">Detalhes do Evento</div><div style="color:var(--text2);font-size:.9rem;line-height:1.7">${html}</div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Fechar</button>${type==='custom'?`<button class="btn btn-danger" onclick="deleteCustomEvent('${data.id}');closeModal()">Excluir</button>`:''}</div>`);

// ── GOOGLE CALENDAR ──
const GOOGLE_CLIENT_ID = '271195047448-vhucujug61c404leuhafkd6ub731rqa1.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
let gcalTokenClient = null;
let gcalEvents = [];

function connectGoogleCalendar() {
  if (!window.google || !window.google.accounts) {
    // Carrega o script da Google Identity Services se não estiver carregado
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => initGoogleAuth();
    document.head.appendChild(script);
    return;
  }
  initGoogleAuth();
}

function initGoogleAuth() {
  if (!window.google || GOOGLE_CLIENT_ID === 'SEU_CLIENT_ID_AQUI.apps.googleusercontent.com') {
    document.getElementById('gcalEvents').innerHTML = `
      <div style="color:var(--orange);font-size:.82rem">⚠️ Configure o Client ID do Google para ativar esta funcionalidade.<br>
      <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--gold)">Gerar credencial no Google Cloud Console</a></div>`;
    return;
  }
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: async (response) => {
      if (response.error) return;
      await loadGoogleCalendarEvents(response.access_token);
    }
  });
  gcalTokenClient.requestAccessToken();
}

async function loadGoogleCalendarEvents(token) {
  const today = new Date().toISOString();
  const isDeborah = state.currentUser?.email === 'administrativo@falcioniconsultoria.com.br';
  try {
    if (isDeborah) {
      // Gestora: busca todos os calendários e une eventos
      const listRes = await fetch(`https://www.googleapis.com/calendar/v3/users/me/calendarList?access_token=${token}`);
      const listData = await listRes.json();
      const cals = (listData.items || []).filter(c => c.accessRole !== 'freeBusyReader');
      const allEvents = await Promise.all(cals.map(async cal => {
        const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${today}&maxResults=10&singleEvents=true&orderBy=startTime&access_token=${token}`);
        const d = await r.json();
        return (d.items || []).map(ev => ({ ...ev, _calName: cal.summary, _calColor: cal.backgroundColor || '#4285F4' }));
      }));
      gcalEvents = allEvents.flat().sort((a, b) => {
        const da = a.start?.dateTime || a.start?.date || '';
        const db = b.start?.dateTime || b.start?.date || '';
        return da.localeCompare(db);
      });
    } else {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${today}&maxResults=20&singleEvents=true&orderBy=startTime&access_token=${token}`);
      const data = await res.json();
      gcalEvents = data.items || [];
    }
    renderGcalEvents();
  } catch (e) {
    document.getElementById('gcalEvents').innerHTML = '<div style="color:var(--red)">Erro ao carregar eventos do Google.</div>';
  }
}

function renderGcalEvents() {
  const el = document.getElementById('gcalEvents');
  if (!el) return;
  if (!gcalEvents.length) { el.innerHTML = '<div style="color:var(--text2)">Nenhum evento próximo encontrado.</div>'; return; }
  document.getElementById('gcalBtn').innerHTML = '✓ Google Agenda conectada';
  document.getElementById('gcalBtn').style.color = 'var(--green)';
  const colors = ['#4285F4','#34A853','#FBBC05','#EA4335','#7B1FA2'];
  el.innerHTML = gcalEvents.slice(0, 10).map((ev, i) => {
    const start = ev.start?.dateTime || ev.start?.date || '';
    const time = start ? new Date(start).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }) : '';
    return `<div class="gcal-event">
      <div class="gcal-dot" style="background:${colors[i%colors.length]}"></div>
      <div class="gcal-info">
        <div class="gcal-evname">${ev.summary||'(sem título)'}</div>
        <div class="gcal-evtime">${time}</div>
      </div>
    </div>`;
  }).join('');
}

function openModalNewCustomEvent(date) {
  const today = date || new Date().toISOString().split('T')[0];
  openModal(`
    <div class="modal-title">Novo Compromisso</div>
    <div class="form-group"><div class="form-label">Título *</div><input class="form-input" id="f_title" placeholder="Título do compromisso"></div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Início</div><input class="form-input" id="f_start" type="datetime-local" value="${today}T09:00"></div>
      <div class="form-group"><div class="form-label">Fim</div><input class="form-input" id="f_end" type="datetime-local" value="${today}T10:00"></div>
    </div>
    <div class="form-group"><div class="form-label">Cliente (opcional)</div>
      <select class="form-input" id="f_proj">
        <option value="">Nenhum</option>
        ${state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><div class="form-label">Responsável</div><input class="form-input" id="f_assigned" value="${state.currentUser?.name||''}"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewCustomEvent()">Salvar</button>
    </div>
  `);
}

function saveNewCustomEvent() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) return alert('Título obrigatório');
  const ev = {
    id: Date.now().toString(),
    title,
    start: document.getElementById('f_start').value,
    end: document.getElementById('f_end').value,
    projectId: document.getElementById('f_proj').value,
    assignedTo: document.getElementById('f_assigned').value
  };
  state.customEvents.push(ev);
  saveCustomEvents();
  closeModal();
  renderAgenda();
}

function deleteCustomEvent(id) {
  state.customEvents = state.customEvents.filter(e => e.id !== id);
  saveCustomEvents();
}
