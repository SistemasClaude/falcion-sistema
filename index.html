<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1A2F4A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FalciON"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>FalciON — Sistema de Projetos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet'/>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/pt-br.global.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F5;--white:#FFFFFF;--border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-light:#DBEAFE;
  --green:#16A34A;--red:#DC2626;--orange:#F59E0B;
  --sidebar:#FFFFFF;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── LOGIN ── */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%;background:linear-gradient(160deg,#1A2F4A 0%,#0d1e30 60%,#162539 100%);padding:32px 16px}
.login-header{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px}
.login-logo{font-size:1.9rem;font-weight:800;color:#FFFFFF;letter-spacing:1px}
.login-logo span{color:#C9A84C;font-weight:300}
.login-tagline{font-size:.75rem;color:rgba(201,168,76,.7);text-transform:uppercase;letter-spacing:2.5px;font-weight:500}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:28px 24px;width:100%;max-width:520px;box-shadow:0 16px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.login-box-title{font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:20px;font-weight:500;text-transform:uppercase;letter-spacing:1.8px;text-align:center;padding-bottom:16px;border-bottom:1px solid rgba(201,168,76,.15)}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.profile-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 14px;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;align-items:center;gap:9px;width:100%;text-align:center}
.profile-btn:hover{border-color:#C9A84C;background:rgba(201,168,76,.1);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.3),0 0 0 1px rgba(201,168,76,.3)}
.profile-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#C9A84C 0%,#9e7e30 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;box-shadow:0 3px 10px rgba(201,168,76,.35),0 0 0 3px rgba(201,168,76,.15)}
.profile-name{font-size:.87rem;color:#FFFFFF;font-weight:700;line-height:1.2}
.profile-email{font-size:.66rem;color:rgba(255,255,255,.38);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px;width:100%}
.login-footer{margin-top:20px;text-align:center;font-size:.68rem;color:rgba(255,255,255,.2);letter-spacing:.5px}

/* ── LAYOUT ── */
#app{display:flex;width:100%;min-height:100vh;display:none}

/* ── SIDEBAR ── */
#sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-text{font-size:1.1rem;font-weight:800;color:var(--text);letter-spacing:.5px}
.logo-sub{font-size:.6rem;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase}
.sidebar-menu{padding:8px 0}
.menu-label{font-size:.62rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:10px 16px 4px;font-weight:600}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:.875rem;color:var(--text2);transition:all .15s;border-left:3px solid transparent;margin:1px 0}
.menu-item:hover{background:var(--bg);color:var(--text)}
.menu-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.menu-icon{font-size:.95rem;width:18px;text-align:center;opacity:.8}
.sidebar-clients{flex:1;overflow-y:auto;padding:0 0 8px}
.client-menu-item{padding:6px 16px 6px 28px;font-size:.78rem;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-menu-item::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.client-menu-item:hover{color:var(--text2)}
.sidebar-user{border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:.8rem;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:4px;border-radius:6px;transition:color .2s;display:flex;align-items:center}
.logout-btn:hover{color:var(--red)}
.settings-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:4px;border-radius:6px;display:flex;align-items:center}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.page-title{font-size:1rem;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.date-badge{font-size:.78rem;color:var(--text2);background:var(--bg);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.notif-btn{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;font-size:.9rem}
.notif-btn:hover{border-color:var(--blue);color:var(--blue)}
.notif-count{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:.6rem;font-weight:700;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.page-content{padding:24px;flex:1}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-icon{font-size:1.4rem;margin-bottom:4px}
.stat-label{font-size:.7rem;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.stat-value{font-size:2rem;font-weight:800;color:var(--text);line-height:1.1}
.stat-sub{font-size:.73rem;color:var(--text3)}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:1rem;font-weight:700;color:var(--text)}
.status-filter-btn{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.82rem;color:var(--text2);cursor:pointer;font-weight:500}
.status-filter-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── CLIENT CARDS (dashboard) ── */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.client-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.client-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
.client-card-banner{width:100%;height:140px;background:#f3f4f6;overflow:hidden;position:relative}
.client-card-banner img{width:100%;height:100%;object-fit:cover}
.client-card-banner-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text3);background:linear-gradient(135deg,#f3f4f6,#e5e7eb)}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.card-action-btn{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;opacity:0;transition:opacity .2s}
.client-card:hover .card-action-btn{opacity:1}
.card-action-edit{background:rgba(255,255,255,.9);color:var(--blue)}
.card-action-del{background:rgba(255,255,255,.9);color:var(--red)}
.client-card-body{padding:14px 16px}
.client-card-name{font-size:.95rem;font-weight:700;color:var(--blue);margin-bottom:12px;cursor:pointer}
.client-card-name:hover{text-decoration:underline}
.client-card-row{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;padding:5px 0;border-bottom:1px solid var(--border)}
.client-card-row:last-child{border-bottom:none}
.client-card-label{color:var(--text2);text-transform:uppercase;font-size:.68rem;letter-spacing:.5px;font-weight:600}
.client-card-val{color:var(--text);font-weight:700;font-size:.82rem}
.saldo-neg{color:var(--red)!important}
.status-ativo{color:var(--green);font-weight:700;font-size:.78rem;text-transform:uppercase}
.status-inativo{color:var(--red);font-weight:700;font-size:.78rem;text-transform:uppercase}
.status-pausado{color:var(--orange);font-weight:700;font-size:.78rem;text-transform:uppercase}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:6px}
.badge-green{background:#DCFCE7;color:#16A34A}
.badge-red{background:#FEE2E2;color:#DC2626}
.badge-orange{background:#FEF3C7;color:#D97706}
.badge-blue{background:#DBEAFE;color:#2563EB}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.85rem;color:var(--text);outline:none;min-width:200px}
.filter-input:focus{border-color:var(--blue)}
.filter-select{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.82rem;color:var(--text);outline:none;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1D4ED8}
.btn-ghost{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:#FEE2E2;color:var(--red);border:1px solid #FECACA}
.btn-danger:hover{background:#FECACA}
.btn-sm{padding:5px 10px;font-size:.78rem}

/* ── TABLE ── */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse}
th{background:#F9FAFB;padding:11px 16px;text-align:left;font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);font-weight:600}
td{padding:12px 16px;font-size:.855rem;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.action-cell{display:flex;gap:6px}

/* ── DETAIL PAGE ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:.85rem;cursor:pointer;margin-bottom:18px;padding:6px 0;transition:color .2s}
.back-btn:hover{color:var(--blue)}
.detail-header{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.detail-name{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:14px}
.detail-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.meta-val{font-size:1rem;font-weight:700;color:var(--text)}

/* ── DETAIL HEADER ── */
.detail-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:9}
.detail-topbar-left{display:flex;align-items:center;gap:12px}
.detail-back{background:none;border:none;cursor:pointer;color:var(--text2);font-size:1.1rem;display:flex;align-items:center;padding:4px;border-radius:6px;transition:color .2s}
.detail-back:hover{color:var(--blue)}
.detail-client-name{font-size:1.4rem;font-weight:800;color:var(--blue)}
.detail-status-badge{background:#DCFCE7;color:#16A34A;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase}
.detail-topbar-right{text-align:right}
.detail-credit-label{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.detail-credit-value{font-size:1.3rem;font-weight:800;color:var(--text)}

/* ── TABS ── */
.tabs{display:flex;gap:0;background:var(--white);border-bottom:1px solid var(--border);margin-bottom:0;flex-wrap:wrap}
.tab{padding:14px 20px;font-size:.88rem;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tab:hover:not(.active){color:var(--text)}

/* ── TAB CONTENT ── */
.tab-content-wrap{padding:24px}
.filter-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filter-card-label{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group-label{font-size:.68rem;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.clear-btn{margin-left:auto;font-size:.78rem;color:var(--text2);background:none;border:none;cursor:pointer;font-weight:600}
.clear-btn:hover{color:var(--red)}

/* ── TASK TABLE ── */
.list-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.list-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.list-card-title{font-size:.72rem;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.list-card-actions{display:flex;align-items:center;gap:12px}
.list-action-link{font-size:.78rem;color:var(--blue);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none}
.list-action-link:hover{text-decoration:underline}
.list-action-add{font-size:.78rem;color:var(--blue);font-weight:700;cursor:pointer;background:none;border:none}
.task-table{width:100%;border-collapse:collapse}
.task-table th{padding:10px 16px;text-align:left;font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);font-weight:600;background:#FAFAFA}
.task-table td{padding:14px 16px;font-size:.82rem;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:#FAFAFA}
.task-check{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.task-name{font-weight:600;font-size:.82rem;text-transform:uppercase;color:var(--text)}
.consultant-avatar{width:30px;height:30px;border-radius:50%;background:#E5E7EB;color:var(--text);display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;text-transform:uppercase}
.badge-pendente{background:#FEF3C7;color:#D97706;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.badge-concluida{background:#DCFCE7;color:#16A34A;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.badge-atrasada{background:#FEE2E2;color:#DC2626;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;font-size:.85rem;color:var(--text2);transition:color .15s}
.icon-btn:hover{color:var(--blue)}
.icon-btn.del:hover{color:var(--red)}

/* ── VISIT TIMELINE ── */
.visit-item{display:grid;grid-template-columns:20px 1fr auto;gap:12px;align-items:start;padding:14px 0;border-bottom:1px solid var(--border)}
.visit-item:last-child{border-bottom:none}
.visit-dot{width:12px;height:12px;border-radius:50%;background:var(--blue);margin-top:4px;flex-shrink:0}
.visit-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.visit-date{font-size:.82rem;font-weight:600;color:var(--text)}
.visit-consultant{font-size:.75rem;font-weight:700;color:var(--blue);text-transform:uppercase}
.visit-desc{font-size:.82rem;color:var(--text2);line-height:1.5;margin-top:4px}
.visit-duration{font-size:.95rem;font-weight:700;color:var(--blue);white-space:nowrap}
.visit-right{display:flex;align-items:center;gap:6px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;display:none}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:.78rem;color:var(--text2);font-weight:600}
.form-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.88rem;color:var(--text);outline:none;width:100%;transition:border-color .2s}
.form-input:focus{border-color:var(--blue);background:var(--white)}
.form-input[type=number]{-moz-appearance:textfield}
textarea.form-input{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-text{font-size:.88rem}

/* ── CRONOGRAMA ── */
.crono-row{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid var(--border);min-height:44px}
.crono-label{padding:10px 16px;font-size:.78rem;font-weight:600;color:var(--text);border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center}
.crono-bar-area{position:relative;padding:0 12px;display:flex;align-items:center}

/* ── AGENDA ── */
.agenda-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toggle-btn{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);transition:all .2s}
.toggle-btn.on{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
#calendar .fc-toolbar-title{color:var(--text);font-size:1rem}
#calendar .fc-button{background:var(--white);border:1px solid var(--border);color:var(--text2);font-size:.8rem;padding:4px 10px}
#calendar .fc-button:hover{background:var(--bg);color:var(--text)}
#calendar .fc-button-active{background:var(--blue)!important;color:#fff!important;border-color:var(--blue)!important}
#calendar .fc-col-header-cell{background:#F9FAFB;color:var(--text2);font-size:.78rem}
#calendar .fc-daygrid-day{background:var(--white)}
#calendar .fc-day-today{background:var(--blue-bg)!important}
#calendar .fc-event{font-size:.75rem;cursor:pointer;border-radius:4px!important}

/* ── GCAL ── */
.gcal-section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:18px}
.gcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gcal-title{font-size:.85rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.gcal-event{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.gcal-event:last-child{border-bottom:none}
.gcal-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.gcal-evname{font-size:.85rem;color:var(--text);font-weight:500}
.gcal-evtime{font-size:.74rem;color:var(--text2)}
.gcal-connect-btn{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-size:.82rem;cursor:pointer;transition:all .2s}
.gcal-connect-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── INFO BOX ── */
.info-box{background:var(--blue-bg);border:1px solid var(--blue-light);border-radius:10px;padding:10px 16px;font-size:.8rem;color:var(--blue);margin-bottom:18px}

@media(max-width:900px){#sidebar{display:none}.stat-grid{grid-template-columns:1fr 1fr}.detail-meta{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>

function fmt(n) {
  const h = Math.floor(Math.abs(n));
  const m = Math.round((Math.abs(n) - h) * 60);
  const s = (n < 0 ? '-' : '') + h.toString() + ':' + m.toString().padStart(2, '0');
  return s;
}

function parseDuration(str) {
  if (!str) return 0;
  const [h, m] = str.split(':').map(Number);
  return h + (m || 0) / 60;
}

function calcSaldo(project) {
  // Saldo = horas iniciais (saldo trazido do mês anterior) + cota mensal - visitas deste mês
  if (!project) return 0;
  const now = new Date();
  const mesStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const visitasEsteMes = state.visits
    .filter(v => v.projectId === project.id && v.date && v.date.startsWith(mesStr))
    .reduce((acc, v) => acc + parseDuration(v.duration), 0);
  return project.initialHours + project.monthlyQuotaHours - visitasEsteMes;
}

function calcSaldoMensal(project, year, month) {
  const mesStr = `${year}-${String(month + 1).padStart(2,'0')}`;
  const now = new Date();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  // Visitas do mês selecionado
  const visitasMes = state.visits
    .filter(v => v.projectId === project.id && v.date && v.date.startsWith(mesStr))
    .sort((a, b) => a.date.localeCompare(b.date));

  const horasGastas = visitasMes.reduce((acc, v) => acc + parseDuration(v.duration), 0);

  // Saldo inicial = horas iniciais configuradas (saldo trazido do período anterior)
  const saldoInicial = project.initialHours;
  // Saldo final = inicial + cota do mês - horas gastas
  const saldoFinal = saldoInicial + project.monthlyQuotaHours - horasGastas;

  return { saldoInicial, visitasMes, horasGastas, saldoFinal, isCurrentMonth };
}

  return { id: r.id, projectId: r.project_id, name: r.name || '', email: r.email || '', phone: r.phone || '', role: r.role || '', createdAt: r.created_at };
}

function mapOccurrence(r) {
  return { id: r.id, projectId: r.project_id, date: r.date || '', description: r.description || '', title: r.title || '', createdAt: r.created_at };
}

function mapCronoItem(r) {
  return { id: r.id, projectId: r.project_id, title: r.title || '', startDate: r.start_date || '', endDate: r.end_date || '', responsible: r.responsible || '', color: r.color || '#1A2F4A', status: r.status || 'em_andamento', createdAt: r.created_at };
}

function mapCronoFile(r) {
  return { id: r.id, projectId: r.project_id, fileName: r.file_name || '', fileType: r.file_type || '', createdAt: r.created_at };
}

// ── LOAD DATA ──
async function loadAll() {
  try {
    const [projects, tasks, visits, notes, contacts, occurrences, profiles] = await Promise.all([
      api.getProjects(),
      api.getTasks(),
      api.getVisits(),
      api.getNotes(),
      api.getContacts(),
      api.getOccurrences(),
      api.getProfiles()
    ]);
    state.projects = projects.map(mapProject);
    state.tasks = tasks.map(mapTask);
    state.visits = visits.map(mapVisit);
    state.notes = notes.map(mapNote);
    state.contacts = contacts.map(mapContact);
    state.occurrences = occurrences.map(mapOccurrence);
    state.profiles = profiles;
    loadCustomEvents();
  } catch (e) {
    console.error('loadAll error', e);
  }
}

function loadCustomEvents() {
  try {
    const raw = localStorage.getItem('falcion_custom_events_shared');
    state.customEvents = raw ? JSON.parse(raw) : [];
  } catch { state.customEvents = []; }
}

function saveCustomEvents() {
  localStorage.setItem('falcion_custom_events_shared', JSON.stringify(state.customEvents));
}

// ── AUTH ──
async function initLogin() {
  const saved = localStorage.getItem('falcion_session');
  if (saved) {
    try {
      state.currentUser = JSON.parse(saved);
      await initApp();
      return;
    } catch {}
  }
  // restaura estrutura do loginBox caso tenha sido substituída pela tela de senha
  const box = document.getElementById('loginBox');
  if (box) box.innerHTML = `
    <p class="login-box-title">Selecione seu perfil para continuar</p>
    <div class="profile-grid" id="profileGrid">
      <div style="text-align:center;padding:24px;color:var(--text2);font-size:.85rem;grid-column:1/-1">Carregando perfis...</div>
    </div>`;

  let profiles = window._loginProfiles || await api.getProfiles().catch(() => []);
  const emailsAutorizados = [
    'falcioniconsultoria1@gmail.com',
    'falcioniconsultoria2@gmail.com',
    'marilia@falcioniconsultoria.com.br',
    'administrativo@falcioniconsultoria.com.br',
    'consultoriacomercialfalcioni@gmail.com',
  ];
  profiles = profiles.filter(p => emailsAutorizados.includes(p.email));
  window._loginProfiles = profiles;
  const grid = document.getElementById('profileGrid');
  if (!profiles.length) {
    grid.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px">Nenhum perfil encontrado.</div>';
    return;
  }
  grid.innerHTML = profiles.map((p, i) => `
    <div class="profile-btn" onclick="selectProfile(${i})">
      <div class="profile-avatar">${avatar(p.name)}</div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-email">${p.email || ''}</div>
    </div>
  `).join('');
}

function selectProfile(index) {
  const p = window._loginProfiles[index];
  if (!p) return;
  // mostra modal de senha
  const box = document.getElementById('loginBox');
  box.innerHTML = `
    <p class="login-box-title">Olá, ${p.name.split(' ')[0]}!</p>
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0">
      <div class="profile-avatar" style="width:60px;height:60px;font-size:1.3rem">${avatar(p.name)}</div>
      <div style="color:#fff;font-weight:700;font-size:1rem">${p.name}</div>
      <input id="pwdInput" type="password" placeholder="Digite sua senha" autocomplete="current-password"
        style="width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid rgba(201,168,76,.3);background:rgba(255,255,255,.06);color:#fff;font-size:.95rem;outline:none"
        onkeydown="if(event.key==='Enter')confirmPassword(${index})" autofocus>
      <div id="pwdError" style="color:#f87171;font-size:.78rem;min-height:18px"></div>
      <div style="display:flex;gap:10px;width:100%">
        <button onclick="initLogin()" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:.85rem">← Voltar</button>
        <button onclick="confirmPassword(${index})" style="flex:2;padding:10px;border-radius:10px;border:none;background:#C9A84C;color:#1A2F4A;font-weight:800;cursor:pointer;font-size:.9rem">Entrar</button>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('pwdInput')?.focus(), 100);
}

async function confirmPassword(index) {
  const p = window._loginProfiles[index];
  const typed = document.getElementById('pwdInput')?.value || '';
  const errEl = document.getElementById('pwdError');
  // senha master = senha da Déborah
  const deborah = window._loginProfiles.find(x => x.email === 'administrativo@falcioniconsultoria.com.br');
  const master = deborah?.password || '';
  if (typed === p.password || (master && typed === master)) {
    state.currentUser = { id: p.id, name: p.name, email: p.email };
    localStorage.setItem('falcion_session', JSON.stringify(state.currentUser));
    initApp();
  } else {
    if (errEl) errEl.textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function logout() {
  localStorage.removeItem('falcion_session');
  state.currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  initLogin();
}

async function initApp() {
  try {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('userAvatar').textContent = avatar(state.currentUser?.name || '');
    document.getElementById('userName').textContent = state.currentUser?.name || '';
    document.getElementById('dateBadge').textContent = dateStr();
    // Timeout de segurança — se travar por mais de 15s, limpa e volta ao login
    const timeout = setTimeout(() => {
      document.getElementById('loadingOverlay').style.display = 'none';
      logout();
      alert('Erro ao carregar dados. Faça login novamente.');
    }, 15000);
    await loadAll();
    clearTimeout(timeout);
    document.getElementById('loadingOverlay').style.display = 'none';
    renderSidebarClients();
    updateNotifBadge();
    navigate('dashboard');
  } catch(e) {
    document.getElementById('loadingOverlay').style.display = 'none';
    console.error('initApp error:', e);
    logout();
    alert('Erro ao iniciar o sistema: ' + e.message + '\nFaça login novamente.');
  }
}

// ── NAVIGATION ──
function navigate(page, projectId) {
  currentPage = page;
  // Reset padding for non-detail pages
  document.getElementById('pageContent').style.padding = page === 'detail' ? '0' : '24px';
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const titles = { dashboard: 'Dashboard', clientes: 'Clientes', tarefas: 'Tarefas', agenda: 'Agenda', cronograma: 'Cronograma', detail: 'Cliente' };
  document.getElementById('pageTitle').textContent = titles[page] || page;

  if (page === 'dashboard') renderDashboard();
  else if (page === 'clientes') renderClientes();
  else if (page === 'tarefas') renderTarefas();
  else if (page === 'agenda') renderAgenda();
  else if (page === 'cronograma') renderCronograma();
  else if (page === 'detail') renderDetail(projectId);
}

function openProject(id) {
  selectedProjectId = id;
  navigate('detail', id);
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function renderDetail(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) { navigate('clientes'); return; }

  document.getElementById('pageTitle').textContent = p.name;
  // Inject detail topbar + tabs into pageContent
  document.getElementById('pageContent').style.padding = '0';
  document.getElementById('pageContent').innerHTML = `
    <div class="detail-topbar">
      <div class="detail-topbar-left">
        <button class="detail-back" onclick="navigate('clientes')">←</button>

        <span class="detail-status-badge">${p.status}</span>
      </div>

        <button onclick="abrirModalRelatorio('${id}')" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">📄 Relatório do Mês</button>
        <div>
          <div class="detail-credit-label">Crédito Total &nbsp;&nbsp;&nbsp; Total</div>

      </div>
    </div>

      <button class="tab ${detailTab==='tarefas'?'active':''}" onclick="switchTab('tarefas','${id}')">Tarefas</button>
      <button class="tab ${detailTab==='visitas'?'active':''}" onclick="switchTab('visitas','${id}')">Registro de Visitas</button>
      <button class="tab ${detailTab==='notas'?'active':''}" onclick="switchTab('notas','${id}')">Notas</button>
      <button class="tab ${detailTab==='contatos'?'active':''}" onclick="switchTab('contatos','${id}')">Contatos</button>
      <button class="tab ${detailTab==='ocorrencias'?'active':''}" onclick="switchTab('ocorrencias','${id}')">Ocorrências</button>
      <button class="tab ${detailTab==='cronograma'?'active':''}" onclick="switchTab('cronograma','${id}')">📅 Cronograma</button>
    </div>
    <div id="tabContent" class="tab-content-wrap"></div>
  `;
  renderTab(id);
}

function switchTab(tab, id) {
  detailTab = tab;
  document.querySelectorAll('#detailTabs .tab').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (tab === 'cronograma') {
    loadCronoData(id).then(() => renderTab(id));
  } else {
    renderTab(id);
  }
}

async function loadCronoData(projectId) {
  try {
    const [items, files] = await Promise.all([
      api.getCronoItems(projectId).catch(() => []),
      api.getCronoFiles(projectId).catch(() => [])
    ]);
    state.cronoItems = state.cronoItems.filter(c => c.projectId !== projectId);
    state.cronoFiles = state.cronoFiles.filter(f => f.projectId !== projectId);
    state.cronoItems.push(...items.map(mapCronoItem));
    state.cronoFiles.push(...files.map(mapCronoFile));
  } catch(e) { console.warn('Cronograma não disponível:', e.message); }
}

function renderTab(id) {
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (detailTab === 'tarefas') el.innerHTML = renderTabTarefas(id);
  else if (detailTab === 'visitas') el.innerHTML = renderTabVisitas(id);
  else if (detailTab === 'notas') el.innerHTML = renderTabNotas(id);
  else if (detailTab === 'contatos') el.innerHTML = renderTabContatos(id);
  else if (detailTab === 'ocorrencias') el.innerHTML = renderTabOcorrencias(id);
  else if (detailTab === 'cronograma') el.innerHTML = renderTabCronograma(id);
}

function taskBadge(t) {
  if (t.status === 'completed') return '<span class="badge-concluida">Concluída</span>';
  if (t.deadline && t.deadline < new Date().toISOString().split('T')[0]) return '<span class="badge-atrasada">Atrasada</span>';
  return '<span class="badge-pendente">Pendente</span>';
}

function renderTabTarefas(id) {
  // Preserve filter values before re-render
  const selUser   = document.getElementById('tf_user')?.value   || '';
  const selStatus = document.getElementById('tf_status')?.value || '';
  const selFrom   = document.getElementById('tf_from')?.value   || '';
  const selTo     = document.getElementById('tf_to')?.value     || '';

  let tasks = state.tasks.filter(t => t.projectId === id);
  const users = [...new Set(tasks.map(t=>t.assignedTo).filter(Boolean))];

  // Apply filters
  if (selUser)   tasks = tasks.filter(t => t.assignedTo === selUser);
  if (selStatus) tasks = tasks.filter(t => t.status === selStatus);
  if (selFrom)   tasks = tasks.filter(t => t.deadline && t.deadline >= selFrom);
  if (selTo)     tasks = tasks.filter(t => t.deadline && t.deadline <= selTo);

  return `
    <div class="filter-card">
      <span class="filter-card-label">⚙ Filtros</span>
      <div class="filter-group">
        <div class="filter-group-label">Atribuído a</div>
        <select class="filter-select" id="tf_user" onchange="renderTab('${id}')">
          <option value="">Todos</option>
          ${users.map(u=>`<option value="${u}" ${u===selUser?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">Status</div>
        <select class="filter-select" id="tf_status" onchange="renderTab('${id}')">
          <option value="">Todos</option>
          <option value="todo" ${selStatus==='todo'?'selected':''}>Pendente</option>
          <option value="completed" ${selStatus==='completed'?'selected':''}>Concluída</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-group-label">De</div>
        <input class="filter-input" type="date" id="tf_from" style="width:140px" value="${selFrom}" onchange="renderTab('${id}')">
      </div>
      <div class="filter-group">
        <div class="filter-group-label">Até</div>
        <input class="filter-input" type="date" id="tf_to" style="width:140px" value="${selTo}" onchange="renderTab('${id}')">
      </div>
      <button class="clear-btn" onclick="clearTaskFilters('${id}')">Limpar</button>
    </div>
    <div class="list-card">
      <div class="list-card-header">
        <span class="list-card-title">Lista de Tarefas</span>
        <div class="list-card-actions">
          <button class="list-action-add" onclick="openModalNewTask('${id}')">+ Adicionar</button>
        </div>
      </div>
      <table class="task-table">
        <thead><tr>
          <th style="width:32px"></th>
          <th>Tarefa</th><th>Consultor(a)</th><th>Prazo</th><th>Tempo Previsto</th><th>Status</th><th>Ações</th>
        </tr></thead>
        <tbody>
          ${tasks.length ? tasks.map(t => `<tr>
            <td><input type="checkbox" class="task-check" ${t.status==='completed'?'checked':''} onchange="completeTask('${t.id}','${id}')"></td>
            <td><span class="task-name">${t.title}</span>${t.description?`<div style="font-size:.75rem;color:var(--text2);margin-top:2px;font-weight:400;text-transform:none">${t.description}</div>`:''}</td>
            <td><div class="consultant-avatar" title="${t.assignedTo||''}">${initials(t.assignedTo)}</div></td>
            <td style="color:var(--text2);font-size:.82rem">${fmtDate(t.deadline)}</td>
            <td style="color:var(--text2);font-size:.82rem">${t.estimatedTime||'–'}</td>
            <td>${taskBadge(t)}</td>
            <td><div style="display:flex;gap:2px">
              <button class="icon-btn" onclick="openModalEditTask('${t.id}','${id}')">✏</button>
              <button class="icon-btn del" onclick="deleteTask('${t.id}','${id}')">🗑</button>
            </div></td>
          </tr>`).join('') : `<tr><td colspan="7"><div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Nenhuma tarefa encontrada.</div></div></td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

// ── CRONOGRAMA TAB ──
function renderTabCronograma(id) {
  const items = state.cronoItems.filter(c => c.projectId === id).sort((a,b) => a.startDate.localeCompare(b.startDate));
  const files = state.cronoFiles.filter(f => f.projectId === id);

  const statusLabel = { 'nao_iniciado': 'Não iniciado', 'em_andamento': 'Em andamento', 'concluido': 'Concluído', 'atrasado': 'Atrasado' };
  const statusColor = { 'nao_iniciado': '#6B7280', 'em_andamento': '#1A2F4A', 'concluido': '#16A34A', 'atrasado': '#DC2626' };

  // Gantt bars
  let gantt = '';
  if (items.length) {
    const allDates = items.flatMap(i => [i.startDate, i.endDate]).filter(Boolean).sort();
    const minDate = new Date(allDates[0]);
    const maxDate = new Date(allDates[allDates.length-1]);
    const totalDays = Math.max(1, (maxDate - minDate) / 86400000) + 1;

    gantt = `
      <div style="overflow-x:auto;margin-top:4px">
        <div style="min-width:600px">
          ${items.map(item => {
            const s = item.startDate ? new Date(item.startDate) : minDate;
            const e = item.endDate   ? new Date(item.endDate)   : s;
            const left  = ((s - minDate) / 86400000) / totalDays * 100;
            const width = Math.max(1, ((e - s)  / 86400000) + 1) / totalDays * 100;
            const col   = statusColor[item.status] || '#1A2F4A';
            return `
              <div style="display:grid;grid-template-columns:180px 1fr 80px;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
                <div style="font-size:.82rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.title}">${item.title}</div>
                <div style="background:var(--bg2);border-radius:4px;height:20px;position:relative">
                  <div style="position:absolute;left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${col};height:100%;border-radius:4px;min-width:4px"></div>
                </div>
                <div style="font-size:.72rem;color:${col};font-weight:600;white-space:nowrap">${statusLabel[item.status]||item.status}</div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  return `
    <div class="list-card">
      <div class="list-card-header">
        <span class="list-card-title">Etapas do Cronograma</span>
        <button class="list-action-add" onclick="openModalNewCronoItem('${id}')">+ Adicionar etapa</button>
      </div>
      <div style="padding:0 20px 16px">
        ${items.length ? `
          <div style="display:grid;grid-template-columns:180px 1fr 80px;gap:8px;padding:6px 0;font-size:.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;border-bottom:2px solid var(--border)">
            <div>Etapa</div><div>Linha do tempo</div><div>Status</div>
          </div>
          ${gantt}
          <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px">
            ${items.map(item => `
              <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:8px">
                <div style="width:10px;height:10px;border-radius:50%;background:${statusColor[item.status]||'#1A2F4A'};flex-shrink:0"></div>
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:.85rem">${item.title}</div>
                  <div style="font-size:.75rem;color:var(--text2)">${fmtDate(item.startDate)} → ${fmtDate(item.endDate)}${item.responsible?' · '+item.responsible:''}</div>
                </div>
                <div style="display:flex;gap:4px">
                  <button class="icon-btn" onclick="openModalEditCronoItem('${item.id}','${id}')">✏</button>
                  <button class="icon-btn del" onclick="deleteCronoItem('${item.id}','${id}')">🗑</button>
                </div>
              </div>`).join('')}
          </div>` : '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Nenhuma etapa cadastrada.</div></div>'}
      </div>
    </div>

    <div class="list-card" style="margin-top:16px">
      <div class="list-card-header">
        <span class="list-card-title">Arquivos do Cronograma</span>
        <label style="cursor:pointer;background:var(--gold);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:.8rem;font-weight:700">
          📎 Upload
          <input type="file" accept="image/*,.pdf" style="display:none" onchange="uploadCronoFile(this,'${id}')">
        </label>
      </div>
      <div style="padding:0 20px 16px">
        ${files.length ? `<div style="display:flex;flex-direction:column;gap:8px">
          ${files.map(f => `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:8px">
              <span style="font-size:1.2rem">${f.fileType.startsWith('image')?'🖼':'📄'}</span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.fileName}</div>
                <div style="font-size:.73rem;color:var(--text2)">${new Date(f.createdAt).toLocaleDateString('pt-BR')}</div>
              </div>
              <button class="icon-btn" onclick="viewCronoFile('${f.id}')">👁</button>
              <button class="icon-btn del" onclick="deleteCronoFile('${f.id}','${id}')">🗑</button>
            </div>`).join('')}
        </div>` : '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Nenhum arquivo enviado.</div></div>'}
      </div>
    </div>`;
}

async function saveNewCronoItem(projectId) {
  const title = document.getElementById('fc_title').value.trim();
  if (!title) return alert('Título obrigatório');
  try {
    const raw = await api.createCronoItem({
      project_id: projectId,
      title,
      start_date: document.getElementById('fc_start').value || null,
      end_date:   document.getElementById('fc_end').value   || null,
      responsible: document.getElementById('fc_resp').value,
      status: document.getElementById('fc_status').value
    });
    state.cronoItems.push(mapCronoItem(raw));
    closeModal();
    renderTab(projectId);
  } catch(e) { alert('Erro ao salvar: ' + e.message); }
}

async function saveEditCronoItem(id, projectId) {
  const title = document.getElementById('fc_title').value.trim();
  if (!title) return alert('Título obrigatório');
  try {
    const raw = await api.updateCronoItem(id, {
      title,
      start_date:  document.getElementById('fc_start').value || null,
      end_date:    document.getElementById('fc_end').value   || null,
      responsible: document.getElementById('fc_resp').value,
      status:      document.getElementById('fc_status').value
    });
    const idx = state.cronoItems.findIndex(c => c.id === id);
    if (idx >= 0) state.cronoItems[idx] = mapCronoItem(raw);
    closeModal();
    renderTab(projectId);
  } catch(e) { alert('Erro ao salvar: ' + e.message); }
}

async function deleteCronoItem(id, projectId) {
  if (!confirm('Excluir esta etapa?')) return;
  try {
    await api.deleteCronoItem(id);
    state.cronoItems = state.cronoItems.filter(c => c.id !== id);
    renderTab(projectId);
  } catch(e) { alert('Erro: ' + e.message); }
}

async function uploadCronoFile(input, projectId) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) return alert('Arquivo muito grande (máx 5MB)');
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const raw = await api.createCronoFile({
        project_id: projectId,
        file_name: file.name,
        file_type: file.type,
        file_data: e.target.result
      });
      state.cronoFiles.unshift(mapCronoFile(raw));
      renderTab(projectId);
    } catch(err) { alert('Erro ao enviar: ' + err.message); }
  };
  reader.readAsDataURL(file);
}

async function viewCronoFile(id) {
  try {
    const f = await api.getCronoFileData(id);
    const w = window.open('');
    if (f.fileType.startsWith('image')) {
      w.document.write(`<img src="${f.file_data}" style="max-width:100%">`);
    } else {
      const link = w.document.createElement('a');
      link.href = f.file_data;
      link.download = f.file_name;
      w.document.body.appendChild(link);
      link.click();
      w.close();
    }
  } catch(e) { alert('Erro ao abrir arquivo: ' + e.message); }
}

async function deleteCronoFile(id, projectId) {
  if (!confirm('Excluir este arquivo?')) return;
  try {
    await api.deleteCronoFile(id);
    state.cronoFiles = state.cronoFiles.filter(f => f.id !== id);
    renderTab(projectId);
  } catch(e) { alert('Erro: ' + e.message); }
}

// ── TAREFAS PAGE ──
let tarefaSearch = '';
let tarefaStatus = 'all';
let tarefaProject = 'all';
let tarefaConsultor = 'all';

function renderTarefas() {
  const allTasks = state.tasks;
  const consultores = [...new Set(allTasks.map(t => t.assignedTo).filter(Boolean))].sort();

  let tasks = allTasks;
  if (tarefaSearch)    tasks = tasks.filter(t => t.title.toLowerCase().includes(tarefaSearch.toLowerCase()));
  if (tarefaStatus !== 'all')    tasks = tasks.filter(t => t.status === tarefaStatus);
  if (tarefaProject !== 'all')   tasks = tasks.filter(t => t.projectId === tarefaProject);
  if (tarefaConsultor !== 'all') tasks = tasks.filter(t => t.assignedTo === tarefaConsultor);

  const today = new Date().toISOString().split('T')[0];
  const projName = id => (state.projects.find(p => p.id === id) || {}).name || '—';

  // Produtividade: montar painel por consultor (com base nas tasks filtradas por cliente/busca/status, mas sem filtro de consultor)
  let tasksProd = allTasks;
  if (tarefaSearch)  tasksProd = tasksProd.filter(t => t.title.toLowerCase().includes(tarefaSearch.toLowerCase()));
  if (tarefaStatus !== 'all')  tasksProd = tasksProd.filter(t => t.status === tarefaStatus);
  if (tarefaProject !== 'all') tasksProd = tasksProd.filter(t => t.projectId === tarefaProject);

  const prodMap = {};
  tasksProd.forEach(t => {
    const c = t.assignedTo || 'Sem responsável';
    if (!prodMap[c]) prodMap[c] = { total: 0, concluidas: 0, pendentes: 0, atrasadas: 0 };
    prodMap[c].total++;
    if (t.status === 'completed') prodMap[c].concluidas++;
    else if (t.deadline && t.deadline < today) prodMap[c].atrasadas++;
    else prodMap[c].pendentes++;
  });

  const prodHTML = Object.entries(prodMap)
    .sort((a, b) => b[1].total - a[1].total)
    .map(([nome, s]) => {
      const pct = s.total ? Math.round(s.concluidas / s.total * 100) : 0;
      const ativo = tarefaConsultor === nome;
      return `
        <div onclick="tarefaConsultor='${tarefaConsultor===nome?'all':nome}';renderTarefas()"
          style="cursor:pointer;padding:12px 16px;border-radius:10px;border:2px solid ${ativo?'var(--blue)':'var(--border)'};background:${ativo?'#EFF6FF':'var(--card)'};transition:.15s">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div class="consultant-avatar" style="flex-shrink:0">${initials(nome)}</div>
            <div style="font-weight:700;font-size:.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nome}</div>
            <div style="font-size:.75rem;font-weight:700;color:${pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}">${pct}%</div>
          </div>
          <div style="background:var(--bg2);border-radius:4px;height:6px;margin-bottom:8px">
            <div style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)'};height:100%;border-radius:4px;transition:.3s"></div>
          </div>
          <div style="display:flex;gap:8px;font-size:.72rem;font-weight:600">
            <span style="color:var(--text2)">Total: ${s.total}</span>
            <span style="color:var(--green)">✓ ${s.concluidas}</span>
            <span style="color:var(--orange)">⏳ ${s.pendentes}</span>
            ${s.atrasadas?`<span style="color:var(--red)">⚠ ${s.atrasadas}</span>`:''}
          </div>
        </div>`;
    }).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="filter-bar" style="margin-bottom:16px">
      <input class="filter-input" placeholder="🔍 Buscar tarefa..." value="${tarefaSearch}" oninput="tarefaSearch=this.value;renderTarefas()">
      <select class="filter-select" onchange="tarefaStatus=this.value;renderTarefas()">
        <option value="all">Todos os status</option>
        <option value="todo" ${tarefaStatus==='todo'?'selected':''}>Pendentes</option>

const GOOGLE_CLIENT_ID = '271195047448-vhucujug61c404leuhafkd6ub731rqa1.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
let gcalTokenClient = null;
let gcalAccessToken = null;  // token salvo em memória — não perde ao trocar de aba

function renderAgenda() {
  document.getElementById('pageContent').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">

      </div>
      <button class="gcal-connect-btn" onclick="connectGoogleCalendar()" id="gcalBtn" style="${gcalAccessToken?'color:var(--green)':''}">
        ${gcalAccessToken ? '🔄 Atualizar agenda' : `<svg width="16" height="16" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:6px"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Conectar Google Agenda`}
      </button>
    </div>
    <div id="calendar"></div>
  `;

  setTimeout(() => {
    if (calendarInstance) calendarInstance.destroy();
    calendarInstance = new FullCalendar.Calendar(document.getElementById('calendar'), {
      locale: 'pt-br',
      initialView: 'timeGridWeek',
      headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listWeek' },
      events: gcalToFullCalendarEvents(),
      eventClick: (info) => {
        const ev = info.event;
        openModal(`<div class="modal-title">${ev.title}</div><div style="color:var(--text2);font-size:.9rem;line-height:1.7">
          Início: ${ev.start ? new Date(ev.start).toLocaleString('pt-BR') : '—'}<br>
          ${ev.end ? 'Fim: ' + new Date(ev.end).toLocaleString('pt-BR') + '<br>' : ''}
          ${ev.extendedProps.location ? 'Local: ' + ev.extendedProps.location + '<br>' : ''}
          ${ev.extendedProps.description ? ev.extendedProps.description : ''}
        </div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Fechar</button></div>`);
      },
      height: 700,
      slotMinTime: '07:00:00',
      slotMaxTime: '22:00:00',
      allDayText: 'Dia todo',
      noEventsText: gcalAccessToken ? 'Nenhum evento nesta semana' : 'Conecte a Google Agenda para ver seus eventos aqui'
    });
    calendarInstance.render();
    // se já tem token, recarrega eventos automaticamente sem pedir login
    if (gcalAccessToken) loadGoogleCalendarEvents(gcalAccessToken);
  }, 100);
}

function gcalToFullCalendarEvents() {
  return (window._gcalRawEvents || []).map((ev, i) => {
    const color = ev._calColor || ['#4285F4','#34A853','#FBBC05','#EA4335','#7B1FA2'][i % 5];
    return {
      id: ev.id,
      title: (ev._calName ? `[${ev._calName}] ` : '') + (ev.summary || '(sem título)'),
      start: ev.start?.dateTime || ev.start?.date,
      end: ev.end?.dateTime || ev.end?.date,
      backgroundColor: color,
      borderColor: color,
      allDay: !ev.start?.dateTime,
      extendedProps: { location: ev.location || '', description: ev.description || '' }
    };
  });
}

function connectGoogleCalendar() {
  if (!window.google?.accounts) {
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => initGoogleAuth();
    document.head.appendChild(script);
    return;
  }
  initGoogleAuth();
}

function initGoogleAuth() {
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: async (response) => {
      if (response.error) return;
      gcalAccessToken = response.access_token;
      await loadGoogleCalendarEvents(gcalAccessToken);
    }
  });
  gcalTokenClient.requestAccessToken();
}

async function loadGoogleCalendarEvents(token) {
  const timeMin = new Date(Date.now() - 7 * 864e5).toISOString();
  const timeMax = new Date(Date.now() + 90 * 864e5).toISOString();
  const isDeborah = state.currentUser?.email === 'administrativo@falcioniconsultoria.com.br';
  try {
    if (isDeborah) {
      const listRes = await fetch(`https://www.googleapis.com/calendar/v3/users/me/calendarList?access_token=${token}`);
      const listData = await listRes.json();
      if (listData.error) { gcalAccessToken = null; return; }
      const cals = (listData.items || []).filter(c => c.accessRole !== 'freeBusyReader');
      const allEvents = await Promise.all(cals.map(async cal => {
        const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${timeMin}&timeMax=${timeMax}&maxResults=100&singleEvents=true&orderBy=startTime&access_token=${token}`);
        const d = await r.json();
        return (d.items || []).map(ev => ({ ...ev, _calName: cal.summary, _calColor: cal.backgroundColor || '#4285F4' }));
      }));
      window._gcalRawEvents = allEvents.flat();
    } else {
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&maxResults=100&singleEvents=true&orderBy=startTime&access_token=${token}`);
      const data = await res.json();
      if (data.error) { gcalAccessToken = null; return; }
      window._gcalRawEvents = data.items || [];
    }
    // atualiza o FullCalendar com os eventos do Google
    if (calendarInstance) {
      calendarInstance.removeAllEvents();
      calendarInstance.addEventSource(gcalToFullCalendarEvents());
    }
    const btn = document.getElementById('gcalBtn');
    const status = document.getElementById('gcalStatus');
    if (btn) { btn.textContent = '🔄 Atualizar agenda'; btn.style.color = 'var(--green)'; }
    if (status) { status.textContent = '✓ Google Agenda conectada'; status.style.color = 'var(--green)'; }
  } catch (e) {
    console.error('Erro Google Calendar:', e);
  }
}

// ── CRONOGRAMA ──
function renderCronograma() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const active = state.projects.filter(p => p.status === 'ATIVO');

  const rows = active.map(proj => {
    const tasks = state.tasks.filter(t => t.projectId === proj.id && t.deadline);
    if (!tasks.length) return `
      <div class="crono-row">
        <div class="crono-label">${proj.name}</div>
        <div class="crono-bar-area" style="color:var(--text3);font-size:.75rem;padding:0 8px">Sem tarefas com prazo</div>
      </div>`;

    const dates = tasks.map(t => new Date(t.deadline + 'T00:00:00'));
    const minDate = new Date(Math.min(...dates));
    const maxDate = new Date(Math.max(...dates));
    // window: 60 dias centrado no hoje
    const winStart = new Date(today); winStart.setDate(winStart.getDate() - 15);
    const winEnd = new Date(today); winEnd.setDate(winEnd.getDate() + 45);
    const winMs = winEnd - winStart;

    const bars = tasks.filter(t => t.deadline).map(t => {
      const d = new Date(t.deadline + 'T00:00:00');
      const pct = Math.max(0, Math.min(100, ((d - winStart) / winMs) * 100));
      const color = t.status === 'completed' ? '#16a34a' : d < today ? '#dc2626' : '#3b82f6';
      const label = t.status === 'completed' ? '✅' : d < today ? '⚠️' : '🔵';
      return `<div title="${t.title} — ${fmtDate(t.deadline)}" style="position:absolute;left:calc(${pct.toFixed(1)}% - 6px);top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:${color};cursor:default;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)" data-tip="${label} ${t.title}"></div>`;
    }).join('');

    // linha do projeto
    const projStart = Math.max(0, Math.min(100, ((minDate - winStart) / winMs) * 100));
    const projEnd   = Math.max(0, Math.min(100, ((maxDate - winStart) / winMs) * 100));
    const projW = Math.max(2, projEnd - projStart);
    const done = tasks.filter(t=>t.status==='completed').length;

    return `
      <div class="crono-row">
        <div class="crono-label" onclick="openProject('${proj.id}')" style="cursor:pointer" title="Abrir cliente">
          ${proj.name}
          <div style="font-size:.68rem;color:var(--text3);font-weight:400">${done}/${tasks.length} tarefas</div>
        </div>
        <div class="crono-bar-area" style="position:relative">
          <div style="position:absolute;left:${projStart.toFixed(1)}%;width:${projW.toFixed(1)}%;height:6px;top:50%;transform:translateY(-50%);background:rgba(59,130,246,.2);border-radius:4px"></div>
          ${bars}
        </div>
      </div>`;
  }).join('');

  // cabeçalho de datas
  const winStart2 = new Date(today); winStart2.setDate(winStart2.getDate() - 15);
  const labels = Array.from({length:7}, (_,i) => {
    const d = new Date(winStart2); d.setDate(d.getDate() + i*9);
    return `<span style="flex:1;font-size:.68rem;color:var(--text3)">${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</span>`;
  }).join('');

  // linha "hoje"
  const todayPct = (((today - winStart2) / (60*864e5)) * 100).toFixed(1);

  document.getElementById('pageContent').innerHTML = `
    <div style="background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:.85rem;font-weight:700;color:var(--text)">📋 Cronograma de Tarefas — próximos 45 dias</div>
        <div style="display:flex;gap:12px;font-size:.72rem;color:var(--text2)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3b82f6;margin-right:4px"></span>Pendente</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#dc2626;margin-right:4px"></span>Atrasada</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#16a34a;margin-right:4px"></span>Concluída</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid var(--border)">
        <div style="padding:8px 16px;font-size:.7rem;color:var(--text3);font-weight:600;border-right:1px solid var(--border)">CLIENTE</div>
        <div style="padding:8px 12px;display:flex">${labels}</div>
      </div>
      <div style="position:relative">
        <div style="position:absolute;left:calc(180px + ${todayPct}% * (100% - 180px) / 100);top:0;bottom:0;width:1px;background:rgba(220,38,38,.4);z-index:1;pointer-events:none"></div>
        ${rows || '<div style="padding:32px;text-align:center;color:var(--text3)">Nenhum cliente ativo com tarefas.</div>'}
      </div>
    </div>
  `;
}

      </div>`;
    }).join('') : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:.82rem">Nenhuma tarefa pendente 🎉</div>'}
    ${notifs.length > 8 ? `<div style="padding:8px 16px;font-size:.75rem;color:var(--text3);text-align:center">+${notifs.length-8} mais</div>` : ''}

async function salvarNovaSenha() {
  const atual = document.getElementById('pwdAtual').value;
  const nova = document.getElementById('pwdNova').value;
  const confirma = document.getElementById('pwdConfirma').value;
  const msg = document.getElementById('pwdMsg');

  const perfil = window._loginProfiles?.find(p => p.email === state.currentUser?.email);
  const deborah = window._loginProfiles?.find(p => p.email === 'administrativo@falcioniconsultoria.com.br');
  const master = deborah?.password || '';

  if (atual !== perfil?.password && atual !== master) {
    msg.style.color = 'var(--red)'; msg.textContent = 'Senha atual incorreta.'; return;
  }
  if (!nova || nova.length < 4) {
    msg.style.color = 'var(--red)'; msg.textContent = 'A nova senha deve ter ao menos 4 caracteres.'; return;
  }
  if (nova !== confirma) {
    msg.style.color = 'var(--red)'; msg.textContent = 'As senhas não coincidem.'; return;
  }

  const { error } = await sb.from('profiles').update({ password: nova }).eq('id', state.currentUser.id);
  if (error) { msg.style.color = 'var(--red)'; msg.textContent = 'Erro ao salvar. Tente novamente.'; return; }

  // atualiza cache local
  if (perfil) perfil.password = nova;
  msg.style.color = 'var(--green)'; msg.textContent = '✓ Senha alterada com sucesso!';
  setTimeout(closeModal, 1500);
}

// ── VOZ ──
let _micRecognition = null;
function startVoice(targetId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Seu navegador não suporta entrada por voz. Use Chrome ou Edge.'); return; }
  if (_micRecognition) { _micRecognition.stop(); _micRecognition = null; }
  const btn = document.getElementById('micBtn_' + targetId);
  const r = new SpeechRecognition();
  r.lang = 'pt-BR';
  r.continuous = true;
  r.interimResults = true;
  _micRecognition = r;
  let base = document.getElementById(targetId)?.value || '';
  r.onstart = () => { if (btn) { btn.textContent = '⏹'; btn.style.color = '#ef4444'; btn.title = 'Parar gravação'; } };
  r.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    base += final;
    const el = document.getElementById(targetId);
    if (el) el.value = base + interim;
  };
  r.onend = () => {
    _micRecognition = null;
    if (btn) { btn.textContent = '🎤'; btn.style.color = ''; btn.title = 'Gravar por voz'; }
  };
  r.onerror = () => r.stop();
  r.start();
}
function stopVoice() { if (_micRecognition) { _micRecognition.stop(); _micRecognition = null; } }
</script>
</body>
</html>
