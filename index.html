<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FalciON — Sistema de Projetos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet'/>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/pt-br.global.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--navy2:#0f1a33;--navy3:#243057;
  --gold:#c9a84c;--gold2:#e8c96a;
  --text:#e8eaf0;--text2:#8a9abb;--text3:#4a5880;
  --green:#16a34a;--red:#dc2626;--blue:#3b82f6;--orange:#f59e0b;
  --surface:#1e2d52;--surface2:#253662;--border:#2d3f6e;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--navy2);color:var(--text);min-height:100vh;display:flex}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--navy2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LOGIN ── */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%;background:var(--navy2);gap:32px;padding:24px}
.login-logo{font-size:2.4rem;font-weight:900;color:var(--gold);letter-spacing:2px}
.login-logo span{color:var(--text2);font-weight:300}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:440px;text-align:center}
.login-box h2{font-size:1.1rem;color:var(--text2);margin-bottom:24px;font-weight:400}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.profile-btn{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:18px 12px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.profile-btn:hover{border-color:var(--gold);background:var(--navy3)}
.profile-avatar{width:44px;height:44px;border-radius:50%;background:var(--gold);color:var(--navy2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem}
.profile-name{font-size:.85rem;color:var(--text);font-weight:600}
.profile-email{font-size:.72rem;color:var(--text2)}

/* ── LAYOUT ── */
#app{display:flex;width:100%;min-height:100vh;display:none}

/* ── SIDEBAR ── */
#sidebar{width:260px;min-width:260px;background:var(--navy);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-text{font-size:1.6rem;font-weight:900;color:var(--gold);letter-spacing:1px}
.logo-sub{font-size:.7rem;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sidebar-menu{padding:12px 0}
.menu-label{font-size:.65rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:12px 20px 4px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:.88rem;color:var(--text2);transition:all .2s;border-left:3px solid transparent}
.menu-item:hover{background:var(--surface);color:var(--text)}
.menu-item.active{background:var(--surface);color:var(--gold);border-left-color:var(--gold)}
.menu-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-clients{flex:1;overflow-y:auto;padding:0 0 12px}
.client-menu-item{padding:8px 20px 8px 32px;font-size:.8rem;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-menu-item:hover{color:var(--text2);background:rgba(255,255,255,.03)}
.sidebar-user{border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--navy2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:.82rem;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:.7rem;color:var(--text2)}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:4px 8px;border-radius:6px;transition:color .2s}
.logout-btn:hover{color:var(--red)}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--navy);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.page-title{font-size:1.05rem;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:16px}
.date-badge{font-size:.8rem;color:var(--text2);background:var(--surface);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}
.notif-btn{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s}
.notif-btn:hover{border-color:var(--gold);color:var(--gold)}
.notif-count{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;border-radius:10px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.page-content{padding:28px;flex:1}

/* ── CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:6px}
.stat-label{font-size:.72rem;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.stat-value{font-size:2.2rem;font-weight:800;color:var(--gold);line-height:1}
.stat-sub{font-size:.75rem;color:var(--text3)}
.stat-card.blue .stat-value{color:var(--blue)}
.stat-card.green .stat-value{color:var(--green)}

/* ── INFO BOX ── */
.info-box{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:10px 16px;font-size:.8rem;color:var(--gold);margin-bottom:20px}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:.85rem;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase}

/* ── CLIENT CARDS (dashboard) ── */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s}
.client-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.client-card-name{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:12px}
.client-card-row{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.client-card-row:last-child{border-bottom:none}
.client-card-label{color:var(--text2)}
.client-card-val{color:var(--text);font-weight:600}
.badge{display:inline-flex;align-items:center;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.badge-green{background:rgba(22,163,74,.15);color:#4ade80}
.badge-red{background:rgba(220,38,38,.15);color:#f87171}
.badge-orange{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
.saldo-neg{color:var(--red)!important}

/* ── CLIENTES PAGE ── */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.85rem;color:var(--text);outline:none;min-width:200px}
.filter-input:focus{border-color:var(--gold)}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.82rem;color:var(--text);outline:none;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--gold);color:var(--navy2)}
.btn-primary:hover{background:var(--gold2)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--gold);color:var(--text)}
.btn-danger{background:rgba(220,38,38,.15);color:var(--red);border:1px solid rgba(220,38,38,.3)}
.btn-danger:hover{background:rgba(220,38,38,.25)}
.btn-sm{padding:5px 10px;font-size:.78rem}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);padding:12px 16px;text-align:left;font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:.85rem;color:var(--text);border-bottom:1px solid rgba(255,255,255,.04)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.action-cell{display:flex;gap:6px}

/* ── DETAIL PAGE ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:.85rem;cursor:pointer;margin-bottom:20px;padding:6px 0;transition:color .2s}
.back-btn:hover{color:var(--gold)}
.detail-header{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.detail-name{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:12px}
.detail-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.meta-val{font-size:1rem;font-weight:700;color:var(--gold)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:none}
.tab.active{background:var(--surface);color:var(--gold)}
.tab:hover:not(.active){color:var(--text)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;display:none}
.modal-overlay.open{display:flex}
.modal{background:var(--navy);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:.78rem;color:var(--text2);font-weight:600}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.88rem;color:var(--text);outline:none;width:100%;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-input[type=number]{-moz-appearance:textfield}
textarea.form-input{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-text{font-size:.88rem}

/* ── AGENDA ── */
.agenda-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toggle-btn{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s}
.toggle-btn.on{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
#calendar .fc{background:transparent}
#calendar .fc-toolbar-title{color:var(--text);font-size:1rem}
#calendar .fc-button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:.8rem;padding:4px 10px}
#calendar .fc-button:hover{background:var(--surface);color:var(--text)}
#calendar .fc-button-active{background:var(--gold)!important;color:var(--navy2)!important;border-color:var(--gold)!important}
#calendar .fc-col-header-cell{background:var(--surface2);color:var(--text2);font-size:.78rem}
#calendar .fc-daygrid-day{background:var(--surface)}
#calendar .fc-daygrid-day:hover{background:var(--surface2)}
#calendar .fc-day-today{background:rgba(201,168,76,.08)!important}
#calendar .fc-daygrid-day-number{color:var(--text2);font-size:.82rem}
#calendar .fc-event{font-size:.75rem;cursor:pointer;border-radius:4px!important}
#calendar .fc-scrollgrid{border-color:var(--border)}
#calendar .fc-scrollgrid td,.fc-scrollgrid th{border-color:var(--border)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #sidebar{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .detail-meta{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .stat-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}

/* ── GOOGLE CALENDAR ── */
.gcal-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.gcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.gcal-title{font-size:.85rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.gcal-event{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.gcal-event:last-child{border-bottom:none}
.gcal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.gcal-info{flex:1}
.gcal-evname{font-size:.85rem;color:var(--text);font-weight:500}
.gcal-evtime{font-size:.75rem;color:var(--text2)}
.gcal-connect-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text2);font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s}
.gcal-connect-btn:hover{border-color:var(--gold);color:var(--text)}
.gcal-connect-btn img{width:16px;height:16px}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginPage">
  <div class="login-logo">FalciON <span>Sistema de Projetos</span></div>
  <div class="login-box">
    <h2>Selecione seu perfil para continuar</h2>
    <div class="profile-grid" id="profileGrid">
      <div style="text-align:center;padding:24px;color:var(--text2);font-size:.85rem;grid-column:1/-1">Carregando perfis...</div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">FalciON</div>
      <div class="logo-sub">Sistema de Projetos</div>
    </div>
    <nav class="sidebar-menu">
      <div class="menu-label">Menu Principal</div>
      <div class="menu-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="menu-icon">📊</span> Dashboard
      </div>
      <div class="menu-item" onclick="navigate('clientes')" id="nav-clientes">
        <span class="menu-icon">👥</span> Clientes
      </div>
      <div class="menu-item" onclick="navigate('tarefas')" id="nav-tarefas">
        <span class="menu-icon">✅</span> Tarefas
      </div>
      <div class="menu-item" onclick="navigate('agenda')" id="nav-agenda">
        <span class="menu-icon">📅</span> Agenda
      </div>
    </nav>
    <div class="sidebar-menu">
      <div class="menu-label">Clientes Ativos</div>
    </div>
    <div class="sidebar-clients" id="sidebarClients"></div>
    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-role">MEMBER</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sair">✕</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <header class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="date-badge" id="dateBadge"></div>
        <div class="notif-btn" onclick="navigate('tarefas')">
          🔔<span class="notif-count" id="notifCount">0</span>
        </div>
      </div>
    </header>
    <div class="page-content" id="pageContent"></div>
  </main>
</div>

<!-- ══ MODALS ══ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://wbqocdokshpfeeacudsm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0iKa7irplUDEJ2oQtTHBuQ_WbHcmE9M';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──
let state = {
  currentUser: null,
  projects: [],
  tasks: [],
  visits: [],
  notes: [],
  contacts: [],
  occurrences: [],
  profiles: [],
  customEvents: [],
  loading: false
};
let currentPage = 'dashboard';
let selectedProjectId = null;
let calendarInstance = null;

// ── HELPERS ──
function fmt(n) {
  const h = Math.floor(Math.abs(n));
  const m = Math.round((Math.abs(n) - h) * 60);
  const s = (n < 0 ? '-' : '') + h.toString() + ':' + m.toString().padStart(2, '0');
  return s;
}

function parseDuration(str) {
  if (!str) return 0;
  const [h, m] = str.split(':').map(Number);
  return h + (m || 0) / 60;
}

function calcSaldo(project) {
  if (!project) return 0;
  const now = new Date();
  const created = new Date(project.createdAt);
  const createdYear = created.getUTCFullYear();
  const createdMonth = created.getUTCMonth();
  const nowYear = now.getFullYear();
  const nowMonth = now.getMonth();
  const monthsElapsed = Math.max(0, (nowYear - createdYear) * 12 + (nowMonth - createdMonth)) + 1;
  const total = project.initialHours + monthsElapsed * project.monthlyQuotaHours;
  const used = state.visits
    .filter(v => v.projectId === project.id)
    .reduce((acc, v) => acc + parseDuration(v.duration), 0);
  return total - used;
}

function calcTotalSaldo() {
  return state.projects
    .filter(p => p.status === 'ATIVO')
    .reduce((acc, p) => acc + calcSaldo(p), 0);
}

function pendingTasks() {
  return state.tasks.filter(t => t.status !== 'completed').length;
}

function activeClients() {
  return state.projects.filter(p => p.status === 'ATIVO').length;
}

function avatar(name) {
  return (name || '?').charAt(0).toUpperCase();
}

function dateStr() {
  return new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR');
}

function statusBadge(s) {
  const map = {
    'ATIVO': 'badge-green', 'INATIVO': 'badge-red',
    'PAUSADO': 'badge-orange', 'completed': 'badge-green',
    'pending': 'badge-orange', 'overdue': 'badge-red'
  };
  const labels = { 'pending': 'Pendente', 'completed': 'Concluída', 'overdue': 'Atrasada' };
  return `<span class="badge ${map[s] || 'badge-blue'}">${labels[s] || s}</span>`;
}

// ── SUPABASE API ──
const api = {
  async getProfiles() {
    const { data, error } = await sb.from('profiles').select('*').order('name');
    if (error) throw error;
    return data || [];
  },
  async getProjects() {
    const { data, error } = await sb.from('projects').select('*').order('name');
    if (error) throw error;
    return data || [];
  },
  async createProject(obj) {
    const { data, error } = await sb.from('projects').insert(obj).select().single();
    if (error) throw error;
    return data;
  },
  async updateProject(id, obj) {
    const { data, error } = await sb.from('projects').update(obj).eq('id', id).select().single();
    if (error) throw error;
    return data;
  },
  async deleteProject(id) {
    const { error } = await sb.from('projects').delete().eq('id', id);
    if (error) throw error;
  },
  async getTasks(projectId) {
    let q = sb.from('tasks').select('*');
    if (projectId) q = q.eq('project_id', projectId);
    const { data, error } = await q.order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  async createTask(obj) {

// ── MAP RAW PROJECTS ──
function mapProject(r) {
  return {
    id: r.id,
    name: r.name,
    imageUrl: r.image_url || null,
    monthlyQuotaHours: Number(r.monthly_quota_hours) || 0,
    initialHours: Number(r.initial_hours) || 0,
    currentBalanceHours: Number(r.current_balance_hours) || 0,
    lastQuotaResetDate: r.last_quota_reset_date || null,
    firstPaymentDate: r.first_payment_date || null,
    lastPaymentDate: r.last_payment_date || null,
    status: r.status || 'ATIVO',
    createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now()
  };
}

function mapTask(r) {
  return {
    id: r.id,
    projectId: r.project_id,
    title: r.title,
    description: r.description || '',
    assignedTo: r.assigned_to || '',
    deadline: r.deadline || '',
    estimatedTime: r.estimated_time || '',
    status: r.status || 'pending',
    createdAt: r.created_at
  };
}

function mapVisit(r) {
  return {
    id: r.id,
    projectId: r.project_id,
    taskId: r.task_id || null,
    date: r.date,
    duration: r.duration || '00:00',
    description: r.description || '',
    assignedTo: r.assigned_to || '',
    createdAt: r.created_at
  };
}

function mapNote(r) {
  return { id: r.id, projectId: r.project_id, content: r.content || '', createdAt: r.created_at };
}

function mapContact(r) {
  return { id: r.id, projectId: r.project_id, name: r.name || '', email: r.email || '', phone: r.phone || '', role: r.role || '', createdAt: r.created_at };
}

function mapOccurrence(r) {
  return { id: r.id, projectId: r.project_id, date: r.date || '', description: r.description || '', title: r.title || '', createdAt: r.created_at };
}

// ── LOAD DATA ──
async function loadAll() {
  try {
    const [projects, tasks, visits, notes, contacts, occurrences, profiles] = await Promise.all([
      api.getProjects(),
      api.getTasks(),
      api.getVisits(),
      api.getNotes(),
      api.getContacts(),
      api.getOccurrences(),
      api.getProfiles()
    ]);
    state.projects = projects.map(mapProject);
    state.tasks = tasks.map(mapTask);
    state.visits = visits.map(mapVisit);
    state.notes = notes.map(mapNote);
    state.contacts = contacts.map(mapContact);
    state.occurrences = occurrences.map(mapOccurrence);
    state.profiles = profiles;
    loadCustomEvents();
  } catch (e) {
    console.error('loadAll error', e);
  }
}

function loadCustomEvents() {
  try {
    const raw = localStorage.getItem('falcion_custom_events_shared');
    state.customEvents = raw ? JSON.parse(raw) : [];
  } catch { state.customEvents = []; }
}

function saveCustomEvents() {
  localStorage.setItem('falcion_custom_events_shared', JSON.stringify(state.customEvents));
}

// ── AUTH ──
async function initLogin() {
  const saved = localStorage.getItem('falcion_session');
  if (saved) {
    try {
      state.currentUser = JSON.parse(saved);
      await initApp();
      return;
    } catch {}
  }
  const profiles = await api.getProfiles().catch(() => []);
  const grid = document.getElementById('profileGrid');
  if (!profiles.length) {
    grid.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px">Nenhum perfil encontrado.</div>';
    return;
  }
  grid.innerHTML = profiles.map(p => `
    <div class="profile-btn" onclick="selectProfile(${JSON.stringify(JSON.stringify(p))})">
      <div class="profile-avatar">${avatar(p.name)}</div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-email">${p.email || ''}</div>
    </div>
  `).join('');
}

function selectProfile(profileJson) {
  const p = JSON.parse(profileJson);
  state.currentUser = { id: p.id, name: p.name, email: p.email };
  localStorage.setItem('falcion_session', JSON.stringify(state.currentUser));
  initApp();
}

function logout() {
  localStorage.removeItem('falcion_session');
  state.currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  initLogin();
}

async function initApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  // topbar
  document.getElementById('userAvatar').textContent = avatar(state.currentUser.name);
  document.getElementById('userName').textContent = state.currentUser.name;
  document.getElementById('dateBadge').textContent = dateStr();
  await loadAll();
  renderSidebarClients();
  document.getElementById('notifCount').textContent = pendingTasks();
  navigate('dashboard');
}

// ── SIDEBAR CLIENTS ──
function renderSidebarClients() {
  const active = state.projects.filter(p => p.status === 'ATIVO');
  document.getElementById('sidebarClients').innerHTML = active.map(p => `
    <div class="client-menu-item" onclick="openProject('${p.id}')">${p.name}</div>
  `).join('');
}

// ── NAVIGATION ──
function navigate(page, projectId) {
  currentPage = page;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const titles = { dashboard: 'Dashboard', clientes: 'Clientes', tarefas: 'Tarefas', agenda: 'Agenda', detail: 'Cliente' };
  document.getElementById('pageTitle').textContent = titles[page] || page;

  if (page === 'dashboard') renderDashboard();
  else if (page === 'clientes') renderClientes();
  else if (page === 'tarefas') renderTarefas();
  else if (page === 'agenda') renderAgenda();
  else if (page === 'detail') renderDetail(projectId);
}

function openProject(id) {
  selectedProjectId = id;
  navigate('detail', id);
}

  const saldo = calcSaldo(p);
  const tasks = state.tasks.filter(t => t.projectId === id);
  const visits = state.visits.filter(v => v.projectId === id);

  document.getElementById('pageTitle').textContent = p.name;
  document.getElementById('pageContent').innerHTML = `
    <div class="back-btn" onclick="navigate('clientes')">← Voltar para Clientes</div>

      <button class="tab ${detailTab==='visitas'?'active':''}" onclick="switchTab('visitas','${id}')">🕐 Visitas (${visits.length})</button>
      <button class="tab ${detailTab==='notas'?'active':''}" onclick="switchTab('notas','${id}')">📝 Notas</button>
      <button class="tab ${detailTab==='contatos'?'active':''}" onclick="switchTab('contatos','${id}')">👤 Contatos</button>

  `;
  renderTab(id);

function switchTab(tab, id) {
  detailTab = tab;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase().includes(tab.substring(0,5)));
  });
  renderTab(id);
}

function renderTab(id) {
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (detailTab === 'tarefas') el.innerHTML = renderTabTarefas(id);
  else if (detailTab === 'visitas') el.innerHTML = renderTabVisitas(id);
  else if (detailTab === 'notas') el.innerHTML = renderTabNotas(id);
  else if (detailTab === 'contatos') el.innerHTML = renderTabContatos(id);
  else if (detailTab === 'ocorrencias') el.innerHTML = renderTabOcorrencias(id);
}

    });

function getCalendarEvents() {
  const events = [];
  const filterProject = p => agendaProjectFilter === 'all' || p === agendaProjectFilter;

  if (calFilters.tasks) {
    state.tasks.filter(t => t.deadline && filterProject(t.projectId)).forEach(t => {
      const proj = state.projects.find(p => p.id === t.projectId);
      events.push({ id: 'task-' + t.id, title: '✅ ' + t.title, start: t.deadline, backgroundColor: '#16a34a', borderColor: '#16a34a', extendedProps: { type: 'task', data: t, projName: proj?.name || '' } });
    });
  }
  if (calFilters.visits) {
    state.visits.filter(v => v.date && filterProject(v.projectId)).forEach(v => {
      const proj = state.projects.find(p => p.id === v.projectId);
      events.push({ id: 'visit-' + v.id, title: '🕐 ' + (proj?.name || 'Visita'), start: v.date, backgroundColor: '#f59e0b', borderColor: '#f59e0b', extendedProps: { type: 'visit', data: v, projName: proj?.name || '' } });
    });
  }
  if (calFilters.occurrences) {
    state.occurrences.filter(o => o.date && filterProject(o.projectId)).forEach(o => {
      const proj = state.projects.find(p => p.id === o.projectId);
      events.push({ id: 'occ-' + o.id, title: '⚠️ ' + (o.title || o.description || 'Ocorrência'), start: o.date, backgroundColor: '#dc2626', borderColor: '#dc2626', extendedProps: { type: 'occurrence', data: o, projName: proj?.name || '' } });
    });
  }
  if (calFilters.custom) {
    state.customEvents.filter(e => filterProject(e.projectId)).forEach(e => {
      events.push({ id: 'custom-' + e.id, title: '📅 ' + e.title, start: e.start, end: e.end, backgroundColor: '#3b82f6', borderColor: '#3b82f6', extendedProps: { type: 'custom', data: e } });
    });
  }
  return events;
}

function toggleFilter(key) {
  calFilters[key] = !calFilters[key];
  renderAgenda();
}

function refreshCalendar() {
  if (!calendarInstance) return;
  calendarInstance.removeAllEvents();
  calendarInstance.addEventSource(getCalendarEvents());
}

function handleEventClick(info) {
  const { type, data, projName } = info.event.extendedProps;
  let html = '';
  if (type === 'task') html = `<b>${data.title}</b><br>Cliente: ${projName}<br>Prazo: ${fmtDate(data.deadline)}<br>Status: ${data.status}`;
  else if (type === 'visit') html = `<b>Visita — ${projName}</b><br>Data: ${fmtDate(data.date)}<br>Duração: ${data.duration}<br>${data.description||''}`;
  else if (type === 'occurrence') html = `<b>${data.title||'Ocorrência'}</b><br>Cliente: ${projName}<br>Data: ${fmtDate(data.date)}<br>${data.description||''}`;
  else if (type === 'custom') html = `<b>${data.title}</b><br>Início: ${data.start}<br>Fim: ${data.end||''}`;
  openModal(`<div class="modal-title">Detalhes do Evento</div><div style="color:var(--text2);font-size:.9rem;line-height:1.7">${html}</div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Fechar</button>${type==='custom'?`<button class="btn btn-danger" onclick="deleteCustomEvent('${data.id}');closeModal()">Excluir</button>`:''}</div>`);
}

function handleDateClick(info) {
  openModalNewCustomEvent(info.dateStr);
}

// ── GOOGLE CALENDAR ──
const GOOGLE_CLIENT_ID = 'SEU_CLIENT_ID_AQUI.apps.googleusercontent.com';
const GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';
let gcalTokenClient = null;
let gcalEvents = [];

function connectGoogleCalendar() {
  if (!window.google || !window.google.accounts) {
    // Carrega o script da Google Identity Services se não estiver carregado
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => initGoogleAuth();
    document.head.appendChild(script);
    return;
  }
  initGoogleAuth();
}

function initGoogleAuth() {
  if (!window.google || GOOGLE_CLIENT_ID === 'SEU_CLIENT_ID_AQUI.apps.googleusercontent.com') {
    document.getElementById('gcalEvents').innerHTML = `
      <div style="color:var(--orange);font-size:.82rem">⚠️ Configure o Client ID do Google para ativar esta funcionalidade.<br>
      <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--gold)">Gerar credencial no Google Cloud Console</a></div>`;
    return;
  }
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: async (response) => {
      if (response.error) return;
      await loadGoogleCalendarEvents(response.access_token);
    }
  });
  gcalTokenClient.requestAccessToken();
}

async function loadGoogleCalendarEvents(token) {
  const today = new Date().toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${today}&maxResults=20&singleEvents=true&orderBy=startTime&access_token=${token}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    gcalEvents = data.items || [];
    renderGcalEvents();
  } catch (e) {
    document.getElementById('gcalEvents').innerHTML = '<div style="color:var(--red)">Erro ao carregar eventos do Google.</div>';
  }
}

function renderGcalEvents() {
  const el = document.getElementById('gcalEvents');
  if (!el) return;
  if (!gcalEvents.length) { el.innerHTML = '<div style="color:var(--text2)">Nenhum evento próximo encontrado.</div>'; return; }
  document.getElementById('gcalBtn').innerHTML = '✓ Google Agenda conectada';
  document.getElementById('gcalBtn').style.color = 'var(--green)';
  const colors = ['#4285F4','#34A853','#FBBC05','#EA4335','#7B1FA2'];
  el.innerHTML = gcalEvents.slice(0, 10).map((ev, i) => {
    const start = ev.start?.dateTime || ev.start?.date || '';
    const time = start ? new Date(start).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }) : '';
    return `<div class="gcal-event">
      <div class="gcal-dot" style="background:${colors[i%colors.length]}"></div>
      <div class="gcal-info">
        <div class="gcal-evname">${ev.summary||'(sem título)'}</div>
        <div class="gcal-evtime">${time}</div>
      </div>
    </div>`;
  }).join('');
}

function openModalNewCustomEvent(date) {
  const today = date || new Date().toISOString().split('T')[0];
  openModal(`
    <div class="modal-title">Novo Compromisso</div>
    <div class="form-group"><div class="form-label">Título *</div><input class="form-input" id="f_title" placeholder="Título do compromisso"></div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Início</div><input class="form-input" id="f_start" type="datetime-local" value="${today}T09:00"></div>
      <div class="form-group"><div class="form-label">Fim</div><input class="form-input" id="f_end" type="datetime-local" value="${today}T10:00"></div>
    </div>
    <div class="form-group"><div class="form-label">Cliente (opcional)</div>
      <select class="form-input" id="f_proj">
        <option value="">Nenhum</option>
        ${state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><div class="form-label">Responsável</div><input class="form-input" id="f_assigned" value="${state.currentUser?.name||''}"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewCustomEvent()">Salvar</button>
    </div>
  `);
}

function saveNewCustomEvent() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) return alert('Título obrigatório');
  const ev = {
    id: Date.now().toString(),
    title,
    start: document.getElementById('f_start').value,
    end: document.getElementById('f_end').value,
    projectId: document.getElementById('f_proj').value,
    assignedTo: document.getElementById('f_assigned').value
  };
  state.customEvents.push(ev);
  saveCustomEvents();
  closeModal();
  renderAgenda();
}

function deleteCustomEvent(id) {
  state.customEvents = state.customEvents.filter(e => e.id !== id);
  saveCustomEvents();
}
